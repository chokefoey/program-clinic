<script>


  function createObjDataDxHistory() {
    const inputs = document.querySelectorAll('.input-dx-history');
    // console.log(inputs)
    const diagnoses = inputs.length === 0 ? [] : Array.prototype.map.call(inputs, function(n) { return n.value });

    const dx = ['dx1', 'dx2', 'dx3', 'dx4', 'dx5'];
    const icd = ['icd1', 'icd2', 'icd3', 'icd4', 'icd5'];

    const result = {};

    for (let i = 0; i < diagnoses.length; i += 2) {
      const dxIndex = Math.floor(i / 2);
      if (dxIndex >= dx.length || dxIndex >= icd.length) {
        break;
      }
      const diagnosis = diagnoses[i] || '';
      if (diagnosis === '') {
        break;
      }
      result[dx[dxIndex]] = diagnosis;
      result[icd[dxIndex]] = diagnoses[i + 1] || '';
    }

    // Check if result is empty and return accordingly
    if (Object.keys(result).length === 0) {
      return { "dx1":"","icd1":""}

    } else {
      return result;
    }

  };




  function createObjDataTxHistory() {
    // Select all input elements with the class 'input-tx-history'
    const inputs = document.querySelectorAll('.input-tx-history');
    
    // Map the values of these inputs to an array
    const treatments = inputs.length === 0 ? [] : Array.prototype.map.call(inputs, function(n) { return n.value });

    // Define keys for treatments, doses, and prices
    const tx = ['tx1', 'tx2', 'tx3', 'tx4', 'tx5', 'tx6', 'tx7', 'tx8', 'tx9', 'tx10'];
    const dose = ['dose1', 'dose2', 'dose3', 'dose4', 'dose5', 'dose6', 'dose7', 'dose8', 'dose9', 'dose10'];
    const price = ['price1', 'price2', 'price3', 'price4', 'price5', 'price6', 'price7', 'price8', 'price9', 'price10'];

    // Initialize result object
    const result = {};

    // Process inputs in groups of three (treatment, dose, price)
    for (let i = 0; i < treatments.length; i += 3) {
      const txIndex = Math.floor(i / 3);
      if (txIndex >= tx.length || txIndex >= dose.length || txIndex >= price.length) {
        break;
      }
      const treatment = treatments[i] || '';
      if (treatment === '') {
        break;
      }
      // Map treatment, dose, and price to the result object
      result[tx[txIndex]] = treatment;
      result[dose[txIndex]] = treatments[i + 1] || '';
      result[price[txIndex]] = treatments[i + 2] || '';
    }

    // Check if result is empty and return accordingly
    if (Object.keys(result).length === 0) {
      return { "tx1":"","dose1":"","price1":""}

    } else {
      return result;
    }

  };



  function createObjDataHmHistory() {
    const inputs = document.querySelectorAll('.input-hm-history');
    const homemeds = inputs.length === 0 ? [] : Array.prototype.map.call(inputs, function(n) { return n.value });

    const hm = ['hm1', 'hm2', 'hm3', 'hm4', 'hm5', 'hm6', 'hm7', 'hm8', 'hm9', 'hm10'];
    const dose = ['dose1', 'dose2', 'dose3', 'dose4', 'dose5', 'dose6', 'dose7', 'dose8', 'dose9', 'dose10'];
    const amount = ['amount1', 'amount2', 'amount3', 'amount4', 'amount5', 'amount6', 'amount7', 'amount8', 'amount9', 'amount10'];
    const price = ['price1', 'price2', 'price3', 'price4', 'price5', 'price6', 'price7', 'price8', 'price9', 'price10'];

    const result = {};

    for (let i = 0; i < homemeds.length; i += 4) {
      const hmIndex = Math.floor(i / 4);
      if (hmIndex >= hm.length || hmIndex >= dose.length || hmIndex >= amount.length || hmIndex >= price.length) {
        break;
      }
      const homemed = homemeds[i] || '';
      if (homemed === '') {
        break;
      }
      result[hm[hmIndex]] = homemed;
      result[dose[hmIndex]] = homemeds[i + 1] || '';
      result[amount[hmIndex]] = homemeds[i + 2] || '';
      result[price[hmIndex]] = homemeds[i + 3] || '';
    }

    // Check if result is empty and return accordingly
    if (Object.keys(result).length === 0) {
      return { "hm1":"","dose1":"","amount1":"","price1":""}
    } else {
      return result;
    }

  };
