function isCidDuplicate(cidInput) {
  if (!cidInput) return false; // Prevent empty values from checking

  const patientRegistData = elements.tablePatientRegist?.getData();
  if (!Array.isArray(patientRegistData)) return false; // Prevent errors if data is invalid

  const trimmedCid = cidInput.trim();
  const rowDataCid = patientRegistData.find(row => row.identityData?.cid?.trim() === trimmedCid);

  return !!rowDataCid; // Returns true if found, false otherwise
  
};


function isFullNameDuplicate(firstnameInput, lastnameInput) {
  if (!firstnameInput || !lastnameInput) return false; // Prevent empty values from checking

  const patientRegistData = elements.tablePatientRegist?.getData();
  if (!Array.isArray(patientRegistData)) return false; // Ensure valid data

  // Find a row where both firstName and lastName match
  const duplicate = patientRegistData.find(row => 
    row.identityData?.firstName?.trim() === firstnameInput.trim() &&
    row.identityData?.lastName?.trim() === lastnameInput.trim()
  );

  return !!duplicate; // Returns true if found, false otherwise
};
