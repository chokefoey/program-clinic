// เรียงให้ตรงกับใน Sheet 🔒SettingView
var viewsIdMap = {
  "1": "home_view_btn",

  "3": "appointment_view_btn",
  "4": "pending_view_btn",
  "5": "treat_view_btn",

  "7": "report_view_btn",
  "8": "drugs_view_btn",
  "9": "dashboard_view_btn",
  "10": "setting_view_btn",
}


userViewConfigArr.forEach(config => {
  // Find the object in elementId that has the matching key
  const found = elementId.find(obj => obj[config]);
  
  // If found, loop through each ID and remove the class 'd-none' เพื่อให้มองเห็น
  if (found) {
    found[config].forEach(id => {
      const element = document.getElementById(id);
      if (element) {
        element.classList.remove('d-none');
        element.removeAttribute('hidden');
       }
    });
  }
});

function showLastView() {
  // Attempt to retrieve the last view ID from session storage
  const lastViewId = sessionStorage.getItem("sLastView");

  // Determine the view ID to show
  let viewIdToShow;

  if (lastViewId !== null) {
    // ตรวจสอบว่า lastViewId อยู่ที่ key เท่าไหร่ใน viewsIdMap
    let lastViewKey = Object.keys(viewsIdMap).find(key => viewsIdMap[key] === lastViewId);

    // console.log("lastViewKey",lastViewKey); // "pending_view_btn" Outputs "4"
    // console.log("userViewConfigArr",userViewConfigArr); // ['1', '2', '7', '8', '9', '12']
  
    if (userViewConfigArr.includes(lastViewKey)) {
      // console.log("lastViewKey is IN the userViewConfigArr!");
      viewIdToShow = lastViewId;
      
    } else {
      // console.log("lastViewKey is NOT in the userViewConfigArr!");
      // seesion of key view ไม่มีใน arr of user view ให้แสดงหน้าแรกของ user view arr
      viewIdToShow = viewsIdMap[userViewConfigArr[0]]; 

    }

  } else {
    const defaultViewSelected = userViewConfigArr[0] // "1"
    const defaultViewId = viewsIdMap[defaultViewSelected]; // "home_view_btn"
    viewIdToShow = defaultViewId;

  }

  // Show the determined view
  showViewById(viewIdToShow);

  // Display the version
  showVersion();
  
};

// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
// sidebar active tab change 
// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++



function activeTabChange(id){
  // console.log(id)
  const elements = document.querySelectorAll(".nav-link"); // Select all elements with class "nav-link"
  // Loop through the selected elements and remove the class
  elements.forEach((element)=>{
    element.classList.remove("my-active")
  });

  const position = id.indexOf("oc") 
  // คลิ๊กที่ sidebar
  if ( position < 0 ){
    const child = document.getElementById(id)
    child.closest('.nav-pills li a').classList.add('my-active')

    const idOcBtn = id.replace("_btn", "_oc_btn")
    // console.log(idOcBtn)
    const childOc = document.getElementById(idOcBtn)
    childOc.classList.add('my-active')
    
  } 
  // คลิ๊กที่ offcanvas
  else if ( position >= 0 ){
    const child = document.getElementById(id)
    child.closest('.nav-pills li a').classList.add('my-active')

    const idOcBtn = id.replace("_oc_btn", "_btn")
    // console.log(idOcBtn)
    const childOc = document.getElementById(idOcBtn)
    childOc.classList.add('my-active')
    
  }

  
};








// ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
// สร้าง function เพื่อดึง content จากหลังบ้าน(คำสั่ง loadPartialHTML_) มาแสดงในหน้า front end
// ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
 

function loadView(options){
  let id = typeof options.id === "undefined" ? "home_view" : options.id ;
  let cb = typeof options.callback === "undefined" ? function(){} : options.callback ;
  loadingStart();
  google.script.run.withSuccessHandler((html)=>{
    document.getElementById(id).innerHTML = html;
    
    typeof options.params === "undefined" ?  cb() : cb(options.params);

    loadingEnd();
  
  })[options.func]();

};
