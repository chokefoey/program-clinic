function createObjDataHmDrugSet() {
  const inputs = document.querySelectorAll('.input-hm-drugset');
  const homemeds = inputs.length === 0 ? [] : Array.from(inputs).map(input => input.value);
  // console.log("homemeds",homemeds)

  const drugOptions = document.querySelectorAll('.drug-options-drugset'); 
  const doseOptions = document.querySelectorAll('.dose-options-drugset');

  // Define keys for home meds, doses, amounts, and prices
  const hmKeys = ['hm1', 'hm2', 'hm3', 'hm4', 'hm5', 'hm6', 'hm7', 'hm8', 'hm9', 'hm10'];
  const doseKeys = ['dose1', 'dose2', 'dose3', 'dose4', 'dose5', 'dose6', 'dose7', 'dose8', 'dose9', 'dose10'];
  const amountKeys = ['amount1', 'amount2', 'amount3', 'amount4', 'amount5', 'amount6', 'amount7', 'amount8', 'amount9', 'amount10'];
  const priceKeys = ['price1', 'price2', 'price3', 'price4', 'price5', 'price6', 'price7', 'price8', 'price9', 'price10'];

  const result = {};

  // Loop through all the drug options
  for (let i = 0; i < drugOptions.length; i++) {
    if (i >= hmKeys.length) break;
    
    // Get drug value and store it in the result
    const drugValue = drugOptions[i].choicesInstance?.getValue(true) || '';
    result[hmKeys[i]] = drugValue;
  }

  // Loop through all the dose options
  for (let i = 0; i < doseOptions.length; i++) {
    if (i >= doseKeys.length) break;

    // Get dose value and store it in the result
    const doseValue = doseOptions[i].choicesInstance?.getValue(true) || '';
    result[doseKeys[i]] = doseValue;
  }

  // Loop through homemeds and assign amounts and prices to the result, using Math.floor(i / 3)
  for (let i = 0; i < homemeds.length; i += 4) {
    const hmIndex = Math.floor(i / 4);
    if (hmIndex >= amountKeys.length || hmIndex >= priceKeys.length) break;

    result[amountKeys[hmIndex]] = homemeds[i + 2] || '';
    result[priceKeys[hmIndex]] = homemeds[i + 3] || '';
  }

  // console.log(result);

  // Check if result is empty and return accordingly
  return Object.keys(result).length === 0 ? { "hm1": "", "dose1": "", "amount1": "", "price1": "" } : result;
  
};
