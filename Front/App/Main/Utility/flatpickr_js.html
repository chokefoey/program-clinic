

<script>




// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
// flatpickr
// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++


 


// Define Thai Locale (Manually)
const Thai = {
  weekdays: {
      shorthand: ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"],
      longhand: ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"]
  },
  months: {
      shorthand: ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."],
      longhand: ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"]
  },
  firstDayOfWeek: 1,
  rangeSeparator: " ถึง ",
  weekAbbreviation: "สัปดาห์",
  scrollTitle: "เลื่อนเพื่อเพิ่มหรือลด",
  toggleTitle: "คลิกเพื่อสลับ",
  time_24hr: true
};



// Reusable function for creating date pickers
function createDatePicker(selector) {
  return flatpickr(selector, {
    enableTime: false,
    dateFormat: "Y-m-d",
    locale: Thai,         // Use Thai locale
    onReady: function (selectedDates, dateStr, instance) {
      let footer = document.createElement("div");
      footer.className = "flatpickr-footer";

      let todayButton = document.createElement("button");
      todayButton.textContent = "Today";
      todayButton.classList.add("flatpickr-today");
      todayButton.addEventListener("click", function () {
          instance.setDate(new Date());
          instance.close();
      });

      let clearButton = document.createElement("button");
      clearButton.textContent = "Clear";
      clearButton.classList.add("flatpickr-clear");
      clearButton.addEventListener("click", function () {
          instance.clear();
          instance.close();
      });

      footer.appendChild(todayButton);
      footer.appendChild(clearButton);
      instance.calendarContainer.appendChild(footer);
    }
  });
}

// Initialize date pickers
elements.datepickerBirthdayPtRegist = createDatePicker(".datepicker");
elements.datepickerBirthdayPtRegist = createDatePicker("#birthday_pt_regist");












</script>
