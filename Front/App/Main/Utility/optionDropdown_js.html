// el แทน element
function addUniqueOptionsToDropdownList(el,arrayOfArrays,index){
  const currentlyAdded = []
  el.innerHTML = '<option></option>' ;
  arrayOfArrays.forEach((r)=>{
    if(currentlyAdded.indexOf(r[index]) === -1){
      const option = document.createElement("option")
      option.textContent = r[index]
      el.appendChild(option);
      currentlyAdded.push(r[index])
    }
    
  })
};

// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
// Function สำหรับสร้าง dropdown ใช้ได้กับทั้ง Select ปกติ และ Datalist option
// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++


function addDropdownOptions(dataArrObj,key,elemId){
  const el = document.getElementById(elemId);
  el.innerHTML = '<option></option>'
  dataArrObj.forEach((item)=>{
    if(item[key] != ''){
      const option = document.createElement('option');
      // option.className = 'dropdown-item';
      option.textContent = item[key];
      el.appendChild(option);

    }
    
  })

};



// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
// ADD OPTION TO DATALIST OPTION OR SELECT
// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++


function addNewOptionToDatalist(dataListId, val) {
  const dataList = document.getElementById(dataListId);

  if (val.trim() !== "") {
      // Check if the option already exists
      let exists = Array.from(dataList.options).some(option => option.value === val);
      if (!exists) {
          let newOption = document.createElement("option");
          newOption.value = val;
          dataList.appendChild(newOption);
      } else {
          alert("Option already exists!");
      }
  }
};


// ลบ deleteoption removeoption delete option remove option
function deleteOptionFromDatalist(dataListId, val) {
  const dataList = document.getElementById(dataListId);

  if (val.trim() !== "") {
      let options = Array.from(dataList.options);
      let optionToDelete = options.find(option => option.value === val);
      
      if (optionToDelete) {
          dataList.removeChild(optionToDelete);
      } else {
          alert("Option not found!");
      }
  }
};
