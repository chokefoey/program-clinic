<script>




function addDrugSet(drugSetInfo){
  loadingStart()
  google.script.run.withSuccessHandler((res)=>{
    console.log("res",res)

    // reset form
    const tbodyHm = document.getElementById('input_hm_drugset');
    while (tbodyHm.firstChild) {
        tbodyHm.removeChild(tbodyHm.firstChild);
    }

    addRowHmDrugSet("", "", "", ""); // Add an empty row if no valid data is found

    
    document.getElementById('drugset_name').textContent = "";
    document.getElementById("new_drugset_name_input").value = "";

    //update data หน้าบ้าน
    elements.tableDrugsSets.addRow({ 
      setId: res[0].newId,
      setName: drugSetInfo.setName, 
      userId: drugSetInfo.userId, 
      drugSet: drugSetInfo.drugSet, 
    }, true, 1);

    // Example: Add a new choice to an element with ID 'example-select' addChoice add choice เพิ่ม choice
    addNewChoiceToElementById('search_input_table_drugset', drugSetInfo.setName, drugSetInfo.setName);

    addNewOptionToDatalist("datalistOptions_newDrugSetName",drugSetInfo.setName)


    loadingEnd();


  }).addDrugSet(drugSetInfo)
  

};



 
function editDrugSet(setId,drugSetInfo){
  loadingStart()
  google.script.run.withSuccessHandler((res)=>{
    console.log("res",res)

    //update data หน้าบ้าน
    elements.tableDrugsSets.updateData([{
      setId: res[0].dataId, 
      drugSet: drugSetInfo.drugSet,
      

    }]); 

    // Example: Add a new choice to an element with ID 'example-select'
    // addNewChoiceToElementId('search_input_table_drugset', drugSetInfo.setName, drugSetInfo.setName);

    loadingEnd();


  }).editDrugSetById(setId,drugSetInfo)
  

};

 

function deleteDrugSetById(setId,setName){
  loadingStart()
  google.script.run.withSuccessHandler((res)=>{
    console.log("res",res)

    // ลบจากตาราง 
    elements.tableDrugsSets.deleteRow(setId); //delete row with an id  
    
    // document.getElementById('drug_info_form').reset()
    // document.getElementById("new_drugset_name_input").value = "";

    // remove choice clear choice
    console.log("setName to remove:"+setName)

    // ลบตัวเลือก clear choice ลบ Choice remove Choice 
    elements["search_input_table_drugset"].removeChoice(setName);

    deleteOptionFromDatalist("datalistOptions_newDrugSetName", setName)


    let modal1 = bootstrap.Modal.getOrCreateInstance(document.getElementById('drugsets_modal')) // Returns a Bootstrap modal instance
    // modal1.show();
    modal1.hide();

    loadingEnd()
    workingEnd('สำเร็จ')

    
  }).deleteDrugSetById(setId)

};




function searchDrugSetByName(e){
  // console.log('Choice details:', e.detail); 
  const val = e.detail.value;
  // console.log(val); // drugSetName

  const tableData = elements.tableDrugsSets.getData();
  // console.log(tableData)

  const filteredData = tableData.filter(item => item.setName === val);
  console.log(filteredData)

  // reset form
  const tbodyHm = document.getElementById('input_hm_drugset');
  while (tbodyHm.firstChild) {
      tbodyHm.removeChild(tbodyHm.firstChild);
  }

  // set data hm drugset *************************
  // set data hm *************************
  // Clean the dataDx object remove undefind
  const cleanedDataHm = cleanData(filteredData[0].drugSet)
  // console.log(cleanedDataHm)

  // Check if cleanedDataHm is empty or if tx1 is empty
  if (Object.keys(cleanedDataHm).length === 0 || cleanedDataHm.hm1 === "") {
    addRowHmDrugSet("", "", "", ""); // Add an empty row if no valid data is found
  } else {
    // Dynamically add rows based on the cleaned data object
    for (let i = 1; i <= Object.keys(cleanedDataHm).length / 4; i++) {
      const hm = cleanedDataHm[`hm${i}`];
      const dose = cleanedDataHm[`dose${i}`];
      const amount = cleanedDataHm[`amount${i}`];
      const price = cleanedDataHm[`price${i}`];
      
      if (hm !== undefined && dose !== undefined && amount !== undefined && price !== undefined) { // Ensure both dx and icd are defined
          addRowHmDrugSet(hm, dose,amount, price);
      }
    }
  }

  setHomemedType('input-hm-drugset', 'homemed-type-drugset');

  document.getElementById('drugset_name').textContent = filteredData[0].setName
  document.getElementById('drugset_id').textContent = filteredData[0].setId




};





function selectDrugSet(){
  removeEmptyRowsHmTreat();

  const numRowHmTreat = document.getElementsByClassName('input-hm-row-treat').length 
  console.log("numRowHmTreat: "+numRowHmTreat)

  const numRowHmDrugset = document.getElementsByClassName('input-hm-row-drugset').length  
  console.log("numRowHmDrugset: "+numRowHmDrugset)
  

  // set data hm
  // const dataHm = createObjDataHmHistory();
  const dataDrugSet = createObjDataHmDrugSet();
  console.log(dataDrugSet)

  if ( numRowHmTreat + numRowHmDrugset > 10 ){
    Swal.fire({ icon:'error',title:'จำกัด 10 รายการ'})
  } else if( dataDrugSet.hm1 == ""  ){
    Swal.fire({ icon:'error',title:'ไม่พบรายการ'})

  } else {
    // Dynamically add rows based on the data object
    for (let i = 1; i <= Object.keys(dataDrugSet).length / 4; i++) {
        addRowHm(dataDrugSet[`hm${i}`], dataDrugSet[`dose${i}`], dataDrugSet[`amount${i}`], dataDrugSet[`price${i}`]);
        
    }

    removeEmptyRowsHmTreat()

    setHomemedType('input-hm-treat', 'homemed-type-treat');

    calPriceHomemed();

    addEventHandlerEnterTreatView();
    workingEnd("สำเร็จ")

  }


};





 


</script>
