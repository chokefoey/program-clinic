<div class="modal fade" tabindex="-1" id="check_patient_modal">
  <div class="modal-dialog modal-dialog-centered modal-lg"> 
    <div class="modal-content">
        <div class="modal-header bg-secondary bg-opacity-10">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

       
        <div class="modal-body bg-secondary bg-opacity-10">
            <center><h5 class="modal-title">เลือกวิธีตรวจสอบข้อมูลอย่างใดอย่างหนึ่งต่อไปนี้</h5></center>

            <div class="row mt-4 justify-content-md-center">
                <div class="col-md" >
                  <center>
                    <form>
                      <div class="form-check form-check-inline ">
                        <input class="form-check-input pointer inlineRadioOptions-type-regist" type="radio" name="inlineRadioOptions" onclick="selectCidCheckForm()" id="inlineRadioOptions_select_cid" value="cid"  >
                        <label class="form-check-label pointer" for="inlineRadioOptions_select_cid">บัตรประชาชน</label>
                      </div>
                      <div class="form-check form-check-inline pointer">
                        <input class="form-check-input pointer inlineRadioOptions-type-regist" type="radio" name="inlineRadioOptions" onclick="selectFullNameCheckForm()" id="inlineRadioOptions_select_fullname" value="fullname">
                        <label class="form-check-label pointer" for="inlineRadioOptions_select_fullname">ชื่อ-นามสกุล</label>
                      </div>
                      <div class="form-check form-check-inline pointer">
                        <input class="form-check-input pointer inlineRadioOptions-type-regist" type="radio" name="inlineRadioOptions" onclick="selectScanCardForm()" id="inlineRadioOptions_select_scan" value="scancard" checked>
                        <label class="form-check-label pointer" for="inlineRadioOptions_select_scan">สแกนบัตร</label>
                      </div>
                    </form>
                  </center>
                </div>
            </div>


          
            <div class="row mt-4">
              <div id="carouselExampleDark" class="carousel carousel-dark slide">
                
                <div class="carousel-inner">
                  <div class="carousel-item active" data-bs-interval="2000">
                    <center><h4 class="mt-4">1.เลขบัตรประชาชน</h4></center>
                    <form id="check_cid_regist_form" onsubmit="return preventEnterSubmit(event)">
                      <div class="row mt-2">
                        <center>
                          <div class="col-md-6 mt-2 ">
                            <label class="form-label">เลข 13 หลัก</label>
                            <div class="input-group">
                              <input type="text" class="form-control text-primary" name="cid" maxlength="13" 
                                    oninput="filterNumericInput(this)" 
                                    id="cid_pt_check" required>
                              <span class="input-group-text" id="cid_validity"></span>
                            </div>
                            <div class="invisible form-text" id="cid_validity_help" >รูปแบบเลขประชาชนอาจไม่ถูกต้อง ต้องการดำเนินการต่อ?</div>
                          </div>
                        </center>
                      </div>
                    </form>
                  </div>

                  <div class="carousel-item" data-bs-interval="2000">
                    <center><h4 class="mt-4">2.ชื่อ-นามสกุล</h4></center>
                    <form id="check_fullname_regist_form" onsubmit="return preventEnterSubmit(event)">
                      <div class="container text-center">
                        <div class="row mt-2 justify-content-md-center">
                          <div class="col-md-4 mt-2">
                            <label class="form-label">ชื่อ(ไม่มีคำนำหน้า)</label>
                            <input type="text" class="form-control text-primary" name="firstName" id="firstname_pt_check" required> 
                          </div>
                          <div class="col-md-4 mt-2">
                            <label class="form-label">นามสกุล</label>
                            <input type="text" class="form-control text-primary" name="lastName" id="lastname_pt_check" required>
                            <div class="invisible form-text" >xxxxxx.</div>
                          </div>
                        </div>
                      </div>
                    </form>
                  </div>

                  <div class="carousel-item" data-bs-interval="2000">
                    <center><h4 class="mt-4">3.เสียบบัตรประชาชน</h4></center>
                    <form id="check_scancard_regist_form" onsubmit="return preventEnterSubmit(event)">
                      <div class="container text-center">
                        <div class="row mt-4 justify-content-md-center">
                          <div class="col-md-4 ">
                            <label class="form-label">คำนำหน้า</label>
                            <input type="text" class="form-control text-primary" name="prefixName" id="prefix_name_scan" > 
                          </div>
                          <div class="col-md-4 ">
                            <label class="form-label">ชื่อ</label>
                            <input type="text" class="form-control text-primary" name="firstName" id="first_name_scan" required> 
                          </div>
                          <div class="col-md-4 ">
                            <label class="form-label">นามสกุล</label>
                            <input type="text" class="form-control text-primary" name="lastName" id="last_name_scan" required>
                          </div>
                        </div>
                      </div>
                      
                      <div class="container text-center">
                        <div class="row mt-2 justify-content-md-center">
                          <div class="col-md-4 ">
                            <label class="form-label">วันเกิด</label>
                            <input type="text" class="form-control text-primary" name="birthDay" id="birth_day_scan" > 
                          </div>
                          <div class="col-md-4 ">
                            <label class="form-label">เพศ</label>
                            <input type="text" class="form-control text-primary" name="genderType" id="gender_type_scan" > 
                          </div>
                          <div class="col-md-4 ">
                            <label class="form-label">เลขที่บัตรประชาชน</label>
                            <input type="text" class="form-control text-primary" name="cidNumber" maxlength="13" oninput="this.value=this.value.replace(/[^0-9]/g,'');"  id="cid_number_scan" required>
                          </div>
                        </div>
                      </div>

                      <div class="container text-center">
                        <div class="row mt-2 justify-content-md-center">
                          <div class="col-md-3 ">
                            <label class="form-label">บ้านเลขที่</label>
                            <input type="text" class="form-control text-primary" name="addressNo" id="address_no_scan" > 
                          </div>
                          <div class="col-md-3 ">
                            <label class="form-label">หมู่</label>
                            <input type="text" class="form-control text-primary" name="addressMoo" id="address_moo_scan" > 
                          </div>
                          <div class="col-md-3 ">
                            <label class="form-label">ซอย</label>
                            <input type="text" class="form-control text-primary" name="addressSoi" id="address_soi_scan" > 
                          </div>
                          <div class="col-md-3 ">
                            <label class="form-label">ถนน</label>
                            <input type="text" class="form-control text-primary" name="addressRoad" id="address_road_scan" > 
                          </div>
                        </div>
                      </div>
                      
                      <div class="container text-center">
                        <div class="row mt-2 justify-content-md-center">
                          <div class="col-md-3 ">
                            <label class="form-label">ตำบล</label>
                            <input type="text" class="form-control text-primary" name="addressTumbon" id="address_tumbon_scan" >
                          </div>
                          <div class="col-md-3 ">
                            <label class="form-label">อำเภอ</label>
                            <input type="text" class="form-control text-primary" name="addressAmphoe" id="address_amphoe_scan" > 
                          </div>
                          <div class="col-md-3 ">
                            <label class="form-label">จังหวัด</label>
                            <input type="text" class="form-control text-primary" name="addressProvince" id="address_province_scan" > 
                          </div>
                          <div class="col-md-3 ">
                            <label class="form-label">รหัสไปรษณีย์</label>
                            <input type="text" class="form-control text-primary" name="zipCode" id="zip_code_scan" >
                          </div>
                        </div>
                      </div>
                    </form>
                  </div>
                
                </div>
                
              </div>

            </div>

            

           


            
            

        </div>

        <div class="modal-footer">
            <button type="button" class="d-none btn btn-primary shadow my-btn" id="check_pt_cid_regist_btn">ดำเนินการต่อ</button>
            <button type="button" class="d-none btn btn-secondary shadow my-btn" id="check_pt_fullname_regist_btn">ดำเนินการต่อ</button>
            <button type="button" class="d-none btn btn-info shadow my-btn" id="check_scan_card_regist_btn">ดำเนินการต่อ</button>

        </div>
    </div>
  </div>
</div>
