function addDropdownOptionsArrToChoiceJsById(keysArray, elementId) {
  // Keys array
  // const keysArray = [
  //     "amount", "dStamp", "expired", "price", "tStamp", 
  //     "options", "drugName", "drugId", "daysRemain", 
  //     "indication", "type", "stockUpdate", "lastUpdate"
  // ];

  // Ensure `keysArray` is an array
  if (!Array.isArray(keysArray)) {
      console.error("keysArray must be an array.");
      return;
  }

  // Check if the dropdown element exists
  const dropdownElement = document.querySelector(`#${elementId}`);
  if (!dropdownElement) {
      console.error(`Element with ID "${elementId}" not found.`);
      return;
  }

  // Ensure `elements` is initialized as a global object
  if (typeof elements === 'undefined') {
      window.elements = {};
  }

  // Destroy existing Choices instance if it exists
  if (elements[elementId]) {
      console.log(`Destroying existing Choices instance for elementId: ${elementId}`);
      elements[elementId].destroy();
      delete elements[elementId];
  }

  // Initialize Choices.js
  const choices = new Choices(dropdownElement, {
      removeItemButton: true, // Allow removing items
      searchEnabled: true     // Enable search functionality
  });

  // Store the Choices instance globally
  elements[elementId] = choices;

  // Add keysArray as dropdown options
  const formattedOptions = keysArray.map(key => ({ value: key, label: key }));
  choices.setChoices(formattedOptions, 'value', 'label', true);

  // Add event listener for choice selection
  dropdownElement.addEventListener('choice', (e) => {
      console.log('Selected value:', e.detail.value); // Log the selected value
      changeEventHandlerChoiceJs(e); // Call your custom event handler
  });

  console.log(`Dropdown for elementId "${elementId}" initialized with ${keysArray.length} options.`);


};




// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
// GET VALUE OF CHOICE 
// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

// get value of choice get choice value getchoicevalue
function getValueOfChoiceById(elementId) {
  // Ensure `elements` is initialized and the Choices instance exists
  if (typeof elements === 'undefined' || !elements[elementId]) {
      console.error(`Choices instance for element ID "${elementId}" not found.`);
      return null;
  }

  // Get the Choices instance
  const choicesInstance = elements[elementId];

  // Get selected value(s)
  const selectedValues = choicesInstance.getValue();

  // Handle the case where no values are selected
  if (!selectedValues || (Array.isArray(selectedValues) && selectedValues.length === 0)) {
      // console.warn(`No value selected for element ID "${elementId}".`);
      console.log(`No value selected for element ID "${elementId}".`);
      return "";
  }

  // If it's a single-select dropdown, return a single value
  if (!Array.isArray(selectedValues)) {
      return selectedValues.value || null;
  }

  // For multi-select, return an array of selected values
  return selectedValues.map(item => item.value);
}




// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
// SET VALUE OF CHOICE 
// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

// set ค่าของ choice js setValue choice setchoicevalue js
function setValueOfChoiceById(elementId, value) {
  // Ensure `elements` is initialized and the Choices instance exists
  if (typeof elements === 'undefined' || !elements[elementId]) {
      console.error(`Choices instance for element ID "${elementId}" not found.`);
      return;
  }

  // Get the Choices instance
  const choicesInstance = elements[elementId];

  // Ensure `value` is valid; if not, default to an empty string
  const selectedValue = value ?? "";

  try {
      // If the value is empty, clear the selection
      if (selectedValue === "") {
          choicesInstance.removeActiveItems();
      } else if (Array.isArray(selectedValue)) {
          // For multi-select dropdowns
          selectedValue.forEach(val => choicesInstance.setChoiceByValue(val));
      } else {
          // For single-select dropdown
          choicesInstance.setChoiceByValue(selectedValue);
      }

      // console.log(`Value "${selectedValue}" set successfully for element ID "${elementId}".`);
  } catch (error) {
      console.error(`Error setting value "${selectedValue}" for element ID "${elementId}":`, error);
  }
};

function addOptionsById_ChoiceJs(dataReturn, key, elementId) {
  // Ensure `elements` is initialized as a global object if not already
  if (typeof elements === 'undefined') {
    window.elements = {};
  }

  // Get the element by ID
  const elem = document.getElementById(elementId); 

  if (!elem) {
    console.error(`Element with ID '${elementId}' not found.`);
    return;
  }

  // Check if a Choices instance already exists and destroy it
  if (elements[elementId]) {
    // console.log(`Destroying existing Choices instance for elementId: ${elementId}`);
    elements[elementId].destroy();
    delete elements[elementId];
  }

  // Clone the element to remove any residual event listeners
  const clonedElem = elem.cloneNode(true);
  elem.parentNode.replaceChild(clonedElem, elem);

  // Initialize a new Choices instance for the cloned element
  elements[elementId] = new Choices(clonedElem, {
    searchEnabled: true,    // Enable search functionality
    removeItemButton: true, // Add remove button for selected options
    placeholderValue: 'เลือก', // Placeholder text
    searchResultLimit: -1, // The maximum amount of search results to show ("-1" indicates no limit).
    placeholder: true,      // Show the placeholder text
    itemSelectText: false,  // Disable item select text
    noResultsText: 'No options available', // Optional: Customize other text
    noChoicesText: 'No choices available',
    position: 'top',
  });

  // Convert dataReturn to { value: key, label: key, selected: true }
  const optionsArr = dataReturn
    .filter(item => item[key] && item[key].trim() !== '') // Filter out items with empty or blank values
    .map(item => ({
      value: item[key],
      label: item[key],
      selected: true, // Mark the options as selected if needed
    }));

  // Set the choices in the dropdown
  elements[elementId].setChoices(
    optionsArr,
    'value',
    'label',
    false
  );

  // Add event listener for choice selection
  clonedElem.addEventListener('choice', (e) => {
    // console.log('Selected value:', e.detail.value); // Log the selected value
    changeEventHandlerChoiceJs(e);
  });

  // console.log(`New Choices instance created for elementId: ${elementId}`);
};



 


// ddOptionsInfo ดึงค่ามาจาก ggSheet ตั้งเป็น global var 
function addOptionsByClass_ChoiceJs(ddOptionsInfo, key, selectElement, val) {
  // Check if the selectElement is valid
  if (!selectElement) {
    console.error('Select element is undefined or null');
    return;
  }

  // Destroy existing Choices instance if present
  if (selectElement.choicesInstance) {
    selectElement.choicesInstance.destroy();
    delete selectElement.choicesInstance;
  }

  // Initialize Choices.js for the current element
  const choiceInstance = new Choices(selectElement, {
    searchEnabled: true,
    removeItemButton: true,
    placeholderValue: 'เลือก',
    searchResultLimit: -1,
    placeholder: true,
    itemSelectText: false,
    noResultsText: 'No options available',
    noChoicesText: 'No choices available',
    position: 'top',
  });

  // Store the Choices instance in the element's dataset
  selectElement.choicesInstance = choiceInstance;

  // Check if ddOptionsInfo is a valid array
  if (!Array.isArray(ddOptionsInfo)) {
    console.error('ddOptionsInfo is not a valid array', ddOptionsInfo);
    return;
  }

  // Convert ddOptionsInfo to an array of objects for Choices.js
  const optionsArr = ddOptionsInfo
    .filter(item => item[key] && item[key].trim() !== '')
    .map(item => ({
      value: item[key],
      label: item[key],
      selected: false
    }));

  // Set the choices in the dropdown
  choiceInstance.setChoices(optionsArr, 'value', 'label', false);

  // If 'val' is provided, check if it exists in options before setting it
  if (val) {
    const optionExists = optionsArr.some(option => option.value === val);

    if (optionExists) {
      choiceInstance.setChoiceByValue(val);
    } else {
      console.log(`Value '${val}' does not exist in the available options.`);
    }
  }

  // Add event listener for choice selection
  choiceInstance.passedElement.element.addEventListener('choice', (e) => {
    console.log('Selected value:', e.detail.value);
    changeEventHandlerChoiceJs(e);
  });
}

// เพิ่ม Choice options addchoice addnewchoice ไปยัง id
function addNewChoiceToElementById(elementId, value, label) {
  // Ensure `elements` object exists and the elementId is valid
  if (typeof elements === 'undefined' || !elements[elementId]) {
    console.error('Choices instance for this element does not exist.');
    return;
  }

  // Add the new choice
  elements[elementId].setChoices(
    [
      { value: value, label: label, selected: false },
    ],
    'value',
    'label',
    false // Do not replace existing choices
  );
};





// เพิ่ม Choice options addchoice addnewchoice ไปยัง class
function addNewChoiceToElementByClass(className, value, label) {
  // Select all elements with the specified class
  const elements = document.querySelectorAll(`.${className}`);

  elements.forEach((element) => {
    // Check if Choices has already been initialized on the element
    let choicesInstance = element.choicesInstance;

    // If not initialized, create a new instance and store it on the element
    if (!choicesInstance) {
      choicesInstance = new Choices(element, { removeItemButton: true });
      element.choicesInstance = choicesInstance; // Attach the instance to the element for reuse
    }

    // Add the new choice
    choicesInstance.setChoices(
      [
        { value: value, label: label, selected: false },
      ],
      'value',
      'label',
      false // Do not replace existing choices
    );
  });
}

// Function to destroy Choices.js instance by elementId
function destroyChoicesInstance(elementId) {
  if (!elements[elementId] || !(elements[elementId] instanceof Choices)) {
    console.error('Choices instance for this element does not exist or is not valid.');
    return;
  }

  // Destroy the Choices.js instance
  elements[elementId].destroy();

  // Optionally remove the reference from the `elements` object
  delete elements[elementId];
}
