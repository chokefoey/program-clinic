// Function to check if the date difference is more than 6 months
const isOlderThan6Months = (dateStr) => {
  const today = new Date();
  const givenDate = new Date(dateStr);
  
  // Calculate the difference in months
  const diffInMonths = (today.getFullYear() - givenDate.getFullYear()) * 12 
                      + (today.getMonth() - givenDate.getMonth());
  
  return diffInMonths > 6;
};

function filterDrugsLowAmount() {
  // Clear any existing filters
  elements.tableDrugCatalog.clearFilter();

  // Apply a custom filter function
  elements.tableDrugCatalog.setFilter((data) => {
    // Check type and apply conditional filtering
    if (data.type === "เม็ด") {
        return data.amount < drugAmountAlert_tablet;

    } else if (data.type === "หลอด") {
        return data.amount < drugAmountAlert_tube;

    } else if (data.type === "ซอง") {
        return data.amount < drugAmountAlert_sachet;

    } else if (data.type === "ขวด") {
        return data.amount < drugAmountAlert_bottle;
        
    } else if (data.type === "แผง") {
        return data.amount < drugAmountAlert_pack;
        
    } else if (data.type === "แคปซูล") {
        return data.amount < drugAmountAlert_capsule;
        
    } else if (data.type === "ชิ้น") {
        return data.amount < drugAmountAlert_pieces;
        
    } else if (data.type === "Ampule") {
        return data.amount < drugAmountAlert_ampule;
        
    } else if (data.type === "Vial") {
        return data.amount < drugAmountAlert_vial;
        
    } else if (data.type === "อัน") {
        return data.amount < drugAmountAlert_item;
        
    } else if (data.type === "แผ่น") {
        return data.amount < drugAmountAlert_sheet;
        
    } else if (data.type === "กล่อง") {
        return data.amount < drugAmountAlert_box;
        
    }
    return false; // If type is neither "เม็ด" nor "หลอด", do not include it
  });

  // Injecting dynamic content into an element with the id 'drug-alert'
  document.getElementById('drug_amount_alert').innerHTML = `
    รายการยาที่เหลือน้อย เงื่อนไข < ${drugAmountAlert_tablet} เม็ด, 
    < ${drugAmountAlert_tube} หลอด,

    < ${drugAmountAlert_pack} แผง,
    < ${drugAmountAlert_capsule} แคปซูล,
    < ${drugAmountAlert_pieces} ชิ้น,
    < ${drugAmountAlert_ampule} Ampule,
    < ${drugAmountAlert_vial} Vial,
    < ${drugAmountAlert_item} อัน,
    < ${drugAmountAlert_sheet} แผ่น,
    < ${drugAmountAlert_box} กล่อง,
  `;

};

function addRowInputHmDrugSet() { 
  // Get all elements with the class '.dose-options' and '.drug-options'
  const drugOptions = document.querySelectorAll('.drug-options-drugset');
  const doseOptions = document.querySelectorAll('.dose-options-drugset');

  // Check if there are any drug or dose options
  if (drugOptions.length === 0) {
      console.log('No elements found with the class .drug-options-drugset.');
      return;
  }

  if (doseOptions.length === 0) {
      console.log('No elements found with the class .dose-options-drugset.');
      return;
  }

  // Get the last element with the class '.drug-options' and '.dose-options-drugset'
  const lastDrugOptions = drugOptions[drugOptions.length - 1];
  const lastDoseOptions = doseOptions[doseOptions.length - 1];

  // Select all elements with the class '.input-hm-amount-drugset'
  const inputs = document.querySelectorAll('.input-hm-amount-drugset');  

  // Check if there are any inputs
  if (inputs.length === 0) {
      console.warn('No elements found with the class .input-hm-amount-drugset');
      return;
  }

  // Get the last input element and check if its value is empty
  const lastInput = inputs[inputs.length - 1];
  const isEmpty = !lastInput.value.trim();

  // Check if Choices.js is initialized on the last element
  if (!lastDrugOptions.choicesInstance) {
      console.log('Choices.js is not initialized on the last .drug-options-drugset element.');
      return;
  }
  if (!lastDoseOptions.choicesInstance) {
      console.log('Choices.js is not initialized on the last .dose-options-drugset element.');
      return;
  }

  // Get the current value from the Choices.js instance
  const selectedDrugValue = lastDrugOptions.choicesInstance.getValue(true);
  const selectedDoseValue = lastDoseOptions.choicesInstance.getValue(true);

  // Validate selected value and input value
  if (!selectedDrugValue) {
      console.log('The last .drug-options-drugset element has no value.');
      Swal.fire({ icon: 'error', title: 'กรุณากรอกชื่อยา' });
      return;
  }
  if (!selectedDoseValue) {
      console.log('The last .dose-options-drugset element has no value.');
      Swal.fire({ icon: 'error', title: 'กรุณากรอกวิธีใช้ยา' });
      return;
  }
  if (isEmpty) {
      console.log('The last input with the class .input-price-dose is empty.');
      Swal.fire({ icon: 'error', title: 'กรุณาระบุจำนวน' });
      return;
  }

  // If all validations pass, proceed to add a new row
  console.log('The last .dose-options-drugset value is:', selectedDoseValue);
  addRowHmDrugSet("", "", "", ""); // Add an empty row if no valid data is found
   

  // clickLastDrugOption()

  // addEventHandlerEnterTreatView();
  
};



 



function calPriceHomemedDrugSet(){
  console.log("คำนวนค่ายา calPriceHomemedDrugSet")

  const inputs = document.querySelectorAll('.input-hm-drugset');
  // console.log(inputs)
  const data = inputs.length === 0 ? [] : Array.prototype.map.call(inputs, (n)=>{ return n.value });
  console.log(data) 

  // let data = ['Diclofenac gel/หลอด/80', '', '1', '', 'Hyoscine 10mg/เม็ด/2', '', '2', '', 'Ofloxacin 200mg/เม็ด/5', '', '2', '', '', '', '', ''];

  // Initialize a total array to store all the calculated products
  let totals = [];

  // Loop through the array with a step of 4 to access each product block 
  for (let i = 0; i < data.length; i += 4) {  
    let item = data[i];        // 'Diclofenac gel/หลอด/80'
    let price = parseFloat(item.split('/')[2]); // Get the price part (80, 2, 5)
    let quantity = parseFloat(data[i + 2]); // Get the quantity part (1, 2, 2)

    if (!isNaN(price) && !isNaN(quantity)) {
      totals.push(price * quantity);
    }
  }

  // Output the totals array containing all calculated values
  console.log(totals); // Output: [80, 4, 10]


  const inputsPriceHm = document.querySelectorAll('.input-hm-price-drugset');
  const values = totals

  inputsPriceHm.forEach((input, index) => {
    if (index < values.length) {
      input.value = values[index];
    }
  });

  // let totals = [80, 4, 10];

  let sumHmPrice = totals.reduce((accumulator, currentValue) => accumulator + currentValue, 0);

  console.log(sumHmPrice); // Outputs: 94
