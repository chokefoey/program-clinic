<script>



 

function clickEventHandlerProcedureInfoModal(e){
  if (e.target.matches("#add_procedure_btn")  ){
    // console.log('add_procedure_btn')
    // const keySelected = getValueOfChoiceById("dd_option_category")
    // console.log(keySelected)
    // const keyOf1Value = []
    // ตรวจสอบ input ที่ required validateform 
    const resInput = checkFormInputRequired("procedure_info_form")   // ถ้าถูกต้องให้ return true ไม่ถูกต้อง false
    // console.log(resInput)

    if( resInput === false ){
        Swal.fire({ title:"กรอกให้ครบ",})

    } else {
      // console.log("OK")
      loadingStart()
      addProcedure()

    }
    

  }
 
    

};



function addProcedure(){
  const procedureInfo = getFormDataById("procedure_info_form")
  console.log(procedureInfo)
  
  google.script.run.withSuccessHandler((res)=>{
    console.log(res)

    document.getElementById('procedure_info_form').reset()

    addNewChoiceToElementByClass('procedure-options', procedureInfo.procedureName, procedureInfo.procedureName);

    const newProceduresInfo = proceduresInfo.concat(procedureInfo);  // proceduresInfo Global var
    // console.log(newProceduresInfo)

    proceduresInfo = newProceduresInfo // proceduresInfo Global var

    // console.log("proceduresInfo",proceduresInfo) // proceduresInfo Global var

    

    loadingEnd()

  }).addProcedureToSheet(procedureInfo)
}



document.getElementById('procedureinfo_modal').addEventListener("click", clickEventHandlerProcedureInfoModal)





</script>
