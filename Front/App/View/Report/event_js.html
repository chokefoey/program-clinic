  function showIncome() {
    // Retrieve data from the table
    const data = elements.tablePending.getData();

    if (!data || !data.length) {
        console.error("No data available");
        return;
    }

    // Get user inputs for filtering
    const dateStart = new Date(document.getElementById("date_start_income_report").value);
    const dateEnd = new Date(document.getElementById("date_end_income_report").value);
    const doctorName = document.getElementById("doctor_name_income_report").value;

    // Validate date inputs
    if (isNaN(dateStart.getTime()) || isNaN(dateEnd.getTime())) {
        console.error("Invalid date range");
        return;
    }
    if (dateEnd < dateStart) {
        console.error("End date cannot be before start date");
        return;
    }

    // Filter data by date range
    const filteredDataByDate = data.filter(item => {
        const itemDate = new Date(item.visitDate);
        return itemDate >= dateStart && itemDate <= dateEnd;
    });
    if (!filteredDataByDate.length) {
        console.log("No data found for the given date range");
        showTableIncome([]); // Show empty table if no data for the date range
        return;
    }

    // Filter data by doctor's name
    let filteredByDoctor = filteredDataByDate.filter(item => item.doctorName === doctorName);

    // If no data is found for the doctor, assign an empty array
    if (!filteredByDoctor.length) {
        console.log("No data found for the selected doctor");
        filteredByDoctor = []; // Set to an empty array
    }

    // Display the filtered data (either the filtered data or an empty array)
    showTableIncome(filteredByDoctor);

    // If no data, no need to calculate totals
    if (!filteredByDoctor.length) {
        console.log("No income data to display");
        // Optionally, you can clear the UI fields here if necessary
        document.getElementById("procedure_income_report").textContent = "0.00";
        document.getElementById("df_income_report").textContent = "0.00";
        document.getElementById("homemed_income_report").textContent = "0.00";
        document.getElementById("total_income_report").textContent = "0.00";
        return;
    }

    // Helper function to calculate and format totals
    const calculateTotal = (field) => {
        return filteredByDoctor.reduce((sum, item) => {
            return sum + (Number(item.summaryData[field]) || 0);
        }, 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    // Calculate and display totals
    const totalProcedure = calculateTotal('sumProcedurePrice');
    const totalDf = calculateTotal('sumDfPrice');
    const totalHomemedPrice = calculateTotal('sumHomemedPrice');
    const totalIncome = calculateTotal('totalPrice');

    // Log the formatted values
    console.log("Total Procedure Income:", totalProcedure);
    console.log("Total DF Income:", totalDf);
    console.log("Total Homemed Price Income:", totalHomemedPrice);
    console.log("Total Income:", totalIncome);

    // Update the UI with the totals
    document.getElementById("procedure_income_report").textContent = totalProcedure;
    document.getElementById("df_income_report").textContent = totalDf;
    document.getElementById("homemed_income_report").textContent = totalHomemedPrice;
    document.getElementById("total_income_report").textContent = totalIncome;
  };
