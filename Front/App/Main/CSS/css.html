/* ************************************************************************************** */
/* line แสดง การทำงานอยู่เบื้องหลัง auto refresh working */
/* ************************************************************************************** */

.line{
    position: fixed;
    top: 0px;
    left: 0;
    width: 100%;
    height: 4px;
    background: #2F4F4F;
    z-index: 99999;
    overflow: hidden;
}
.dot{
    position: absolute;
    height: 100%;
    width: 5px;
    background: #fff;
    animation: dotleft 2s cubic-bezier(.72,.03,.75,.54) infinite;
}
.dot1{
}
.dot2{
    animation-delay: .4s;
}
.dot3{
    animation-delay: .8s;
}
.dot4{
    animation-delay: 1.2s;
}
.dot5{
    animation-delay: 1.6s;
}
@keyframes dotleft {
    0% {
        left: 0%;
    }
    100% {
        left: 100%;
    }
}
