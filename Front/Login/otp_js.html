<script>




  function openModalInputOtp(dataReturn){
    // console.log("dfdfdfd")

    // Show or hide:

    document.getElementById('otp_return').innerHTML = dataReturn[0].otpForUserAdd
    document.getElementById('ref_return').innerHTML = dataReturn[0].refOtpForUserAdd
    document.getElementById('otp_receiving_email').innerHTML = dataReturn[0].userEmailAdd

    
    // Example usage: Start a countdown for 5 minutes (300 seconds)
    startCountdown(150, function() {
      // alert('Countdown finished!'); // Callback function to be executed when countdown ends
      closeModalInputOtp();
      Swal.fire({ icon:'error', title:'คุณไม่ได้กรอก OTP ภายในเวลาที่กำหนด', html:"<h5 align='center'>กรุณาลองใหม่อีกครั้ง</h5>"})
    });

    const myTimeout = setTimeout(()=>{
      document.getElementById('otp_field_1').focus()
    }, 1000);


  };

 


 


  var otp_inputs = document.querySelectorAll(".otp__digit")
  var mykey = "0123456789".split("")
  otp_inputs.forEach((_)=>{
    _.addEventListener("keyup", handle_next_input)
  })

  function handle_next_input(event){
    let current = event.target
    let index = parseInt(current.classList[1].split("__")[2])
    current.value = event.key
    
    if(event.keyCode == 8 && index > 1){
      current.previousElementSibling.focus()
    }
    if(index < 6 && mykey.indexOf(""+event.key+"") != -1){
      var next = current.nextElementSibling;
      next.focus()
    }
    var _finalKey = ""
    for(let {value} of otp_inputs){
        _finalKey += value
    }
    if(_finalKey.length == 6){
      document.querySelector("#_otp").classList.replace("_notok", "_ok")
      document.querySelector("#_otp").innerText = _finalKey
    }else{
      document.querySelector("#_otp").classList.replace("_ok", "_notok")
      document.querySelector("#_otp").innerText = _finalKey
    }
    
  };



 

  // closemodal showmodal
  function closeModalInputOtp(){
    // console.log("fdfdfdfd")
    let modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('modal_inputotp')) // Returns a Bootstrap modal instance
    // Show or hide:
    // modal.show();
    modal.hide();

  };






  let countdownInterval; // Declare the interval variable outside the function

  // Function to start the countdown
  function startCountdown(duration, callback) {
    let timer = duration;
    const countdownElement = document.getElementById('countdown');

    countdownInterval = setInterval(function() {
      const minutes = Math.floor(timer / 60);
      const seconds = timer % 60;

      countdownElement.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

      if (--timer < 0) {
        clearInterval(countdownInterval);
        callback(); // Call the callback function when the countdown reaches zero
      }
    }, 1000); // Update the countdown every second (1000 milliseconds)
  };



  function resendOTP(){
    loadingStart();
    stopCountdown();
    clearInputOtp();

    const userEmailAdd = document.getElementById("email_adress_user_add").value.trim().toString().toLowerCase()
    sendOTPforUserAdd(userEmailAdd)

  };


  function clearInputOtp(){
    // Select all elements with class "otp__digit"
    const otpDigits = document.querySelectorAll(".otp__digit");

    // Loop through each OTP digit element and set its input value to an empty string
    otpDigits.forEach((otpDigit)=>{
      otpDigit.value = "";
    });


  };


  // Function to stop the countdown
  function stopCountdown() {
    clearInterval(countdownInterval);
    // alert('Countdown stopped!');

  };






</script>
