      <div class="modal-body bg-secondary bg-opacity-10">

              <label class="form-label">PID</label>

            <div class="col-md-4 mt-2">

              <input type="text" class="form-control"  id="opd_visitid_calendar" disabled>

              <input type="text" class="form-control"  id="appointmentid_calendar" disabled>

          </div>

              <label class="form-label">วันที่นัด</label>
              <input type="text" class="form-control text-primary datepicker" id="start_date_calendar" required disabled>

            <div class="col-md-3 mt-2">

        <button type="button" class="btn btn-primary" id="edit_calendar_event_btn">แก้ไขข้อมูล</button>
        <button type="button" class="btn btn-danger" id="delete_calendar_event_btn">ยกเลิกนัด</button>
