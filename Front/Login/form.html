

<div class="container mt-4" id="login_view">
  <div class=" col-md-6 mt-4 ">
    
    <form method="post" id="form_login">
      <div class="bg-info bg-opacity-50 p-3 rounded-top shadow-sm">
        <center><h1><i class="bi bi-person-fill-lock"></i></h1></center>
      </div>

      <div class="bg-info bg-opacity-25 p-3 rounded-bottom shadow-lg mb-5">
        <div class="input-group mb-3">
          <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
          <input type="text" class="form-control" placeholder="Username" name="username" id="username_login_input" >
        </div>
        <div class="input-group mb-2">
          <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
          <input type="password" class="form-control" placeholder="Password" name="password" id="password_login_input" >
        </div>
        <div class="form-check form-switch text-start mb-3">
          <input class="pointer form-check-input" type="checkbox" role="switch" id="show_password_check" onchange="showPassword()">
          <label class="pointer form-check-label link-warning text-info" for="show_password_check">Show password</label>
        </div>
        <center>
          <button type="submit" class="btn btn-info shadow text-white" style="--bs-btn-padding-y: .5rem; --bs-btn-padding-x: 3.5rem; --bs-btn-font-size: .75rem;" id="enter_login_button">ENTER</button>
        </center>
        <center>
          <div class="col mt-2">
            <p>
              <span class="pointer link-warning text-info" data-bs-toggle="modal" data-bs-target="#modal_registration">ลงทะเบียนผู้ใช้งานใหม่</span>&nbsp;
              <span class="pointer link-warning text-info" data-bs-toggle="modal" data-bs-target="#modal_forgetpass">ลืมรหัสผ่าน</span>
            </p>
             
          </div>
        </center>
          
      </div>

    </form>

    <center>
      <div class="col mt-2" id="show_version">
          <p class="text-info" id="version"></p>
      </div>
    </center>


  </div>


  <!-- Modal Registration -->
  <div class="modal fade" id="modal_registration" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true" data-bs-focus="false">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-info bg-opacity-50">
          <h1 class="modal-title fs-5" >Registration</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body bg-info bg-opacity-10">
          <div class=" row mt-2">
            <div class="row justify-content-md-center">
              <center>
                <img class="img-link border border-2 rounded-circle" src="" width="150" height="150" id="user_pic_large">
              </center>
            </div>
            <div class="col-md-12">
              <label class="form-label">ภาพโปรไฟล์(Optional)(รองรับ jpg,png ขนาด < 100KB)</label>
              <input class="form-control" type="file" id="user_pic_regist_input"/>
            </div>
            <!-- <div class="col-md-2">
              <label class="form-label">xxx</label>
              <div>
                <button type="button" class="btn btn-primary" id="upload_userpic_btn">Upload</button>
              </div>
            </div> -->
            <!-- <div class="col-md-2">
              <label class="form-label">xxx</label>
              <div>
                <button type="button" class="btn btn-primary" id="cancelupload_userpic_btn">Cancel</button>
              </div>
            </div> -->

            
          </div>
          

          <form class="row g-3 mt-2" id="user_add_form">
            <div class="col-md-4">
              <label class="form-label">First name</label>
              <input type="text" class="form-control" id="first_name_user_add" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Last name</label>
              <input type="text" class="form-control" id="last_name_user_add" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">ตำแหน่ง</label>
              <!-- <input type="text" class="form-control" id="user_posiion_add" required> -->
              <select class="form-select" aria-label="Default select example" id="user_posiion_add" required>
                <option value="" selected> </option>
                <option value="Doctor">Doctor</option>
                <option value="Nurse">Nurse</option>
                <option value="PT">PT</option>
                <option value="OT">OT</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" id="user_name_user_add" required>
            </div>
            
            <div class="col-md-4">
              <label class="form-label">Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="pass_word_user_add" required>
                <span class="input-group-text">
                  <i class="pointer bi bi-eye" onclick="showHidePasswordRegist()" id="eye_open_pwd1"></i>
                  <i class="pointer d-none bi bi-eye-slash" onclick="showHidePasswordRegist()" id="eye_close_pwd1"></i>
                </span>
              </div>
            </div>
            <div class="col-md-4">
              <label class="form-label">Re-enter Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="repeatpass_word_user_add" required>
                <span class="input-group-text">
                  <i class="pointer bi bi-eye" onclick="showHidePasswordRegist()" id="eye_open_pwd2"></i>
                  <i class="pointer d-none bi bi-eye-slash" onclick="showHidePasswordRegist()" id="eye_close_pwd2"></i>
                </span>
              </div>
            </div>

            <div class="col-md-4">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email_adress_user_add" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'');" id="user_phone_add" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">จังหวัด</label>
              <input class="form-control" list="datalistOption_userProvince" id="room_area_user_add" required> 
              <datalist id="datalistOption_userProvince"> 
                <option value="SNK">
                <option value="NPM">
                <option value="NBP">
                <option value="NKI">
                <option value="LEI">
                <option value="UDN">
                <option value="BKN">
              </datalist>
            </div>
            <div class="col-md-4">
              <label class="form-label">หน่วยบริการ</label>
              <input class="form-control" list="datalistOptions_user_hos" id="user_hos_add" required>
              <datalist id="datalistOptions_user_hos">
                <option value="สกลนคร/รพศ.สกลนคร">
                <option value="อุดรธานี/รพศ.อุดรธานี">
                 
              </datalist>
            </div>

            <div class="d-none col-md-12">
              <label class="form-label">แนบเอกสาร(Optional)</label>
              <input class="form-control" type="file" id="user_regist_file1_input"/>
            </div>

            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input pointer" type="checkbox" value="yes" id="invalidCheck1" required>
                <label class="form-check-label pointer" for="invalidCheck1">
                  Agree to terms and conditions1
                </label>
              </div>
            </div>
            <div class="col-12 mb-3">
              <div class="form-check">
                <input class="form-check-input pointer" type="checkbox" value="yes" id="invalidCheck2" required>
                <label class="form-check-label pointer" for="invalidCheck2">
                  Agree to terms and conditions2
                </label>
              </div>
            </div>

          </form>

          <div class="modal-footer">
            <button type="button" class="btn btn-primary" id="user_regist_btn">ลงทะเบียน</button>
          </div>


        </div>
          
      </div>
    </div>
  </div>

  <!-- Modal Forgot your password -->
  <div class="modal fade" id="modal_forgetpass" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true" data-bs-focus="false">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-info bg-opacity-50">
          <h1 class="modal-title fs-5" id="staticBackdropLabel">Forgot your password</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">กรุณากรอก Email address ที่ได้ลงทะเบียนไว้</label>
            <input type="email" class="form-control" id="email_adress_user_forget" placeholder="name@example.com">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" id="request_password_btn">ขอรหัสผ่าน</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal input OTP  -->
  <div class="modal fade" id="modal_inputotp" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true" data-bs-focus="false">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <!-- <div class="modal-header bg-info bg-opacity-50">
          <h1 class="modal-title fs-5" id="staticBackdropLabel">INPUT OTP</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div> -->
        <div class="modal-body">
          <p class="d-none text-black">
            <span>OTP: </span>
            <span id="otp_return"></span>
          </p>

          <div class="title">
            <h3>Please fill OTP within <h1 id="countdown">1:00</h1></h3>
            <p class="info">An otp has been sent to 
              <span class="text-primary" id="otp_receiving_email"></span>
              <span>Ref:</span>
              <span id="ref_return"></span>
            </p>
            <p class="msg">Please enter OTP to verify or <a class="pointer link-primary" id="resend_otp_btn" >Resend</a></p>
          </div>
          <div class="otp-input-fields">
            <input type="number" class="otp__digit otp__field__1" id="otp_field_1">
            <input type="number" class="otp__digit otp__field__2">
            <input type="number" class="otp__digit otp__field__3">
            <input type="number" class="otp__digit otp__field__4">
            <input type="number" class="otp__digit otp__field__5">
            <input type="number" class="otp__digit otp__field__6">
          </div>
          <div class="result d-none"><p id="_otp" class="_notok"></p></div>
          
             
          <center><button type="button" class="btn btn-primary mt-2" id="confirm_otp_btn" >Confirm</button></center>
            
        </div>
         
      </div>
    </div>
  </div>


  




</div>
