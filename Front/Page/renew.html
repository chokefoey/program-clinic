      /* ************************************************************************************** */
      /* line แสดง การทำงานอยู่เบื้องหลัง auto refresh  working */
      /* ************************************************************************************** */

      .line{
        position: fixed;
        top: 0px;
        left: 0;
        width: 100%;
        height: 4px;
        background: #2F4F4F;
        z-index: 99999;
        overflow: hidden;
      }
      .dot{
        position: absolute;
        height: 100%;
        width: 5px;
        background: #fff;
        animation: dotleft 2s cubic-bezier(.72,.03,.75,.54) infinite;
      }
      .dot1{
      }
      .dot2{
        animation-delay: .4s;
      }
      .dot3{
        animation-delay: .8s;
      }
      .dot4{
        animation-delay: 1.2s;
      }
      .dot5{
        animation-delay: 1.6s;
      }
      @keyframes dotleft {
        0% {
            left: 0%;
        }
        100% {
            left: 100%;
        }
      }


       
      #countdown {
        font-size: 2rem;
        color: #333;
      }


    </style>

    <script>

      



      function confirmOtpRenew(){

      // +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
      // Function นับถอยหลัง
      // +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

      // Set the initial countdown duration (5 minutes in milliseconds)
      const countdownDuration = 5 * 60 * 1000;
      let targetTime = new Date().getTime() + countdownDuration;
      let timerInterval;


      // Function to execute when the countdown ends
      function onTimeout() {
        document.getElementById("countdown").innerHTML = "หมดเวลา";
        // alert("Countdown has ended!"); // Example action: Display an alert
        console.log("Executing timeout function...");

        // document.getElementById("otp_login_input").setAttribute("disabled", "");
        // document.getElementById("send_otp_renew_btn").setAttribute("disabled", "");
        // document.getElementById("otp_login_input").setAttribute("hidden", "");
        // document.getElementById("send_otp_renew_btn").setAttribute("hidden", "");
        document.getElementById("renew_user_form").setAttribute("hidden", "");
        

      };



      // Function to update the countdown display
      function updateCountdown() {
        const now = new Date().getTime();
        const timeLeft = targetTime - now;

        if (timeLeft <= 0) {
          clearInterval(timerInterval); // Stop the timer
          onTimeout(); // Call the timeout function
          return;
        }

        // Calculate minutes and seconds
        const minutes = Math.floor(timeLeft / (1000 * 60));
        const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

        // Display the countdown
        document.getElementById("countdown").innerHTML = `
          ${minutes} นาที ${seconds < 10 ? "0" + seconds : seconds} วินาที
        `;
      }

      // Function to start or restart the countdown
      function startCountdown() {
        clearInterval(timerInterval); // Clear any existing interval
        targetTime = new Date().getTime() + countdownDuration; // Reset target time
        timerInterval = setInterval(updateCountdown, 1000); // Start the interval
        updateCountdown(); // Update immediately
      }

      // Function to reset the countdown
      function resetCountdown() {
        console.log("Resetting the countdown...");
        startCountdown(); // Restart the countdown
      }

      // Event listener for the reset button
      // document.getElementById("resetButton").addEventListener("click", resetCountdown);

      // Start the countdown initially
      startCountdown();

      function loadingStart() {
        Swal.fire({
          title: 'Processing...',
          html: '<div id="progress-bar-container" style="width: 100%; background-color: #e9ecef; border-radius: 5px;">' +
                '<div id="progress-bar" class="swal2-progress-bar" style="width: 0%"></div>' +
                '</div>',
          showConfirmButton: false,
          allowOutsideClick: false,
          didOpen: () => {
            let progressBar = document.getElementById('progress-bar');
            let width = 0;
            let elapsedTime = 0;
            let interval = setInterval(() => {
                width += 2.5;  // Increments width by 2.5% every 0.1 second
                elapsedTime += 0.1;  // Increments elapsed time by 0.1 second
                progressBar.style.width = width + '%';

                if (elapsedTime >= 4) {  // Stops after 4 seconds
                    clearInterval(interval);
                    // Swal.fire({
                    //     title: 'Stopped!',
                    //     text: 'Progress has been stopped after 4 seconds.',
                    //     icon: 'warning',
                    //     showConfirmButton: true
                    // });
                }

                if (width >= 100) {
                    clearInterval(interval);
                    // Swal.fire({
                    //     title: 'Completed!',
                    //     icon: 'success',
                    //     timer: 1500,
                    //     showConfirmButton: false
                    // });
                }
            }, 100);  // Updates every 0.1 second
          }
        });
      }





      function loadingEnd(){
        Swal.close()
        
      };
