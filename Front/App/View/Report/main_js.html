// downloadexcel download excel downloadtabulator download tabulator

function flattenObject(obj, parent = '', res = {}) {
  for (let key in obj) {
      const propName = parent ? parent + '.' + key : key;
      if (typeof obj[key] == 'object') {
          flattenObject(obj[key], propName, res);
      } else {
          res[propName] = obj[key];
      }
  }
  return res;
};



async function getDataReportPatientRegist() {

  const data = elements.tablePatientRegist.getData();
  console.log(data)

  const selectKey = [
    'patientId', 'dateStamp', 'timeStamp', 'incrementHn', 'dateRegist',
    'identityData', 'contactData','addressData','medicalData','otherData','userStamp', 
  ];

  // Map the filtered data to only include the keys in selectKey
  const filteredAndMappedData = data.map(item => {
    let filteredItem = {};
    selectKey.forEach(key => {
      if (item.hasOwnProperty(key)) {
        filteredItem[key] = item[key];
      }
    });
    return filteredItem;
  });

  console.log(filteredAndMappedData);

  // Flatten JSON data
  const flattenedData = filteredAndMappedData.map(item => {
    const flattenedItem = flattenObject(item);

    // Destructure to remove the specific key (e.g., 'piData') from the flattened item
    const { identityData,contactData,addressData,medicalData,otherData,userStamp, ...newFlattenedItem } = flattenedItem;

    return newFlattenedItem;
  });

  const XLSX = await import("https://cdn.sheetjs.com/xlsx-0.19.2/package/xlsx.mjs");
