

<script>




function addNewOption(){

  loadingStart();

  const key = getValueOfChoiceById("dd_option_category");
  // console.log(key);

  const val1 = document.getElementById("dd_option_val1").value.trim()
  const val2 = document.getElementById("dd_option_val2").value.trim() === "" ? "" : "/" + document.getElementById("dd_option_val2").value.trim();
  const val3 = document.getElementById("dd_option_val3").value.trim() === "" ? "" : "/" + document.getElementById("dd_option_val3").value.trim();

 
  const val = val1+val2+val3
  const label = val1+val2+val3

  google.script.run.withSuccessHandler((res)=>{
    console.log(res)


    // reset form
    document.getElementById("dd_option_val1").value = "";
    document.getElementById("dd_option_val2").value = "";
    document.getElementById("dd_option_val3").value = "";

    // elements["dd_option_category"].removeActiveItems(); 

    if ( key === "icd10"){
      addNewChoiceToElementByClass('icd10-options', val, label);

    }
    if ( key === "dose"){
      addNewChoiceToElementByClass('dose-options', val, label);

    }
    // ส่งค่าไปเก็บไว้ใน ddOptionsInfo Global var ด้วย
    ddOptionsInfo.push({
      [key]: val // Computed property name: the value of `val` is used as the key
    });


    setDropDownOptions();

    elements.tableDropdownOptions.addRow({ 
      [key]:val, 
    }, true, 1);

     

    loadingEnd();


  }).addNewOptionToSheet(key,val)


};




</script>
