

<script>


  // สร้าง template obj รอแทนค่าแล้วส่งเข้าไปลหลังบ้าน
  let fileInfo =  
                  {
                    file1: {
                      inputId: "user_pic_regist_input", // input id 
                      name: '',               // file name sample
                      base64: '', // file base64 sample ว่างไว้
                      header: "userPic"      // ต้องตรงกับในหัวตารางใน Sheet 
                    } 
                  }


  async function createBase64Data(e) {
    const files = e.target.files; // FileList object
    const fileName = files[0].name
    // console.log(files) 
    // console.log(fileName) 

    const base64File = await convertToBase64(files[0]) // return file base64 

    // Example usage to find "file_input1" and return key file1
    let fileFound = findFileByInputId(e);

    if (fileFound) {
      // console.log(fileFound)  // return file obj
      fileFound.name = fileName;
      fileFound.base64 = base64File;

    } else {
      console.log("File not found with inputId:", inputIdToFind);
    }

    console.log(fileInfo) 

  };





  function checkFileTypeAndSize(e) {
    const inputId = e.target.id
    const fileInput = document.getElementById(inputId);
    const file = fileInput.files[0];  // Get the first file from the input
    
    const acceptedTypes = ["image/jpeg", "image/png"]
    const acceptedSize = 100 // Size in KB
    
    const fileType = file.type;
    const fileSize = file.size;

    // const file = event.target.files[0]; // Get the first file from the input
    const fileSizeInBytes = file.size; // Size in bytes
    const yourFileSize = (fileSizeInBytes / 1024).toFixed(2);; // Size in KB
    // console.log("yourFileSize " + yourFileSize + ' KB')
 
    const checkTypeResult = acceptedTypes.includes(fileType)   // true or false

    if ( checkTypeResult == false )  {
      const output = [{ 
                        result: "Incorrect",
                        detail: "Invalid file type. Only JPG, and PNG files are accepted",
                        fileTypeInput: fileType
                      }] 
      // console.log(output)
      return output
      
    } else if (yourFileSize > acceptedSize) {
      const output = [{
                        result: "Incorrect",
                        detail: "Please upload a file < 100 KB",
                        fileSize: yourFileSize,
                        fileTypeInput: fileType
                      }] 
      // console.log(output)
      return output
      
    } else {
      const output = [{ 
                        result: "Correct",
                        detail: "Good!! File type and size is correct",
                        fileTypeInput: fileType
                      }] 
      // console.log(output)
      return output

    }

  };



  function convertToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });

  };





  // หา key ใน fileInfo object ด้วย input id
  // Example usage to find "file_input1" and return key file1
  function findFileByInputId(e) {
    // fileInfo is global var
    let inputIdToFind = e.target.id;
    
    for (let key in fileInfo) {
      if (fileInfo[key].inputId === inputIdToFind) {
        return fileInfo[key];
      }
    }
    return null;

  };


  function cancelFile(e){
    // fileInfo is global var
    let inputIdToFind = e.target.id;

    for (let key in fileInfo) {
      if (fileInfo[key].inputId === inputIdToFind) {
        fileInfo[key].name = ""
        fileInfo[key].base64 = ""
        document.getElementById(inputIdToFind).value = ""
      }
    }
    
    // console.log(fileInfo) 

  };

      console.log("The selected file is empty.")

    else {
      console.log("upload ภาพ")
      console.log(fileInfo)

      google.script.run.withSuccessHandler((res)=>{
        console.log(res)

        const picId = res[0].userPic.split('/')[5]
        const urlPic = 'https://lh5.googleusercontent.com/d/' + picId
        
        console.log(urlPic)

        return urlPic

    }

</script>
