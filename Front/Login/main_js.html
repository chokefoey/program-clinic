function loadingStart() {

          '</div>',
    showConfirmButton: false,
    allowOutsideClick: false,
    didOpen: () => {
      let progressBar = document.getElementById('progress-bar');
      let width = 0;
      let elapsedTime = 0;
      let interval = setInterval(() => {
          width += 2.5;  // Increments width by 2.5% every 0.1 second
          elapsedTime += 0.1;  // Increments elapsed time by 0.1 second
          progressBar.style.width = width + '%';

          if (elapsedTime >= 4) {  // Stops after 4 seconds
              clearInterval(interval);
              // Swal.fire({
              //     title: 'Stopped!',
              //     text: 'Progress has been stopped after 4 seconds.',
              //     icon: 'warning',
              //     showConfirmButton: true
              // });
          }

          if (width >= 100) {
              clearInterval(interval);
              // Swal.fire({
              //     title: 'Completed!',
              //     icon: 'success',
              //     timer: 1500,
              //     showConfirmButton: false
              // });
          }
      }, 100);  // Updates every 0.1 second
    }
  });
}

function checkFormInputRequired(formId) {
  // Get the form element
  const myForm = document.getElementById(formId);
  if (!myForm) return false; // Check if form exists

  // Function to validate input fields
  const validateInputs = () => {
    let allFieldsFilled = true;
    const inputWithRequired = myForm.querySelectorAll('.form-control[required], .form-select[required]');

    inputWithRequired.forEach(input => {
      if (input.value.trim() === '') {
        input.style.backgroundColor = 'Orange';
        allFieldsFilled = false;
      } else {
        input.style.backgroundColor = '';
      }
    }); 

    return allFieldsFilled;
  };

  // Add event listener to dynamically validate input fields on user input
  myForm.addEventListener("input", (e) => {
    if (e.target.matches('.form-control[required], .form-select[required]')) {
      validateInputs();
    }
  });

  // Perform initial validation check and return the result
  return validateInputs();

};




function checkCheckBox(formId){
  let allResult = []

  // *** step 1 Get the form element
  const myForm = document.getElementById(formId)

  // Get all checkBoxes within the form
  const checkBoxes = myForm.querySelectorAll('.form-check-input[required]')
  // console.log(checkBoxes.length)

  if ( checkBoxes.length != 0){
    let checkBoxValues = []
  
    // Iterate through checkBoxes and check if each one is checked
    checkBoxes.forEach((checkbox)=>{
      if (!checkbox.checked) {
        // ถ้า checkBox อันไหน ไม่ถูกติ้ก ให้ส่ง id เข้าไปเก็บไว้
        checkBoxValues.push(checkbox.id)
        // console.log('Checkbox ' + checkbox.id + ' is checked');
      }
    })


    const resCheckBox = checkBoxValues.length == 0 ? true : false 
    // console.log(resCheckBox)
    allResult.push(resCheckBox)

  }

  // *** return 
  // console.log(allResult)
  const allTrue = allResult.every(value => value === true);
  // console.log(allTrue); // Output: true if everything correct

  return allTrue



};

// Function to generate a random OTP
function generateRefOTP(length) {
  const characters = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
  let otp = '';

  for (let i = 0; i < length; i++) {
    const randomIndex = Math.floor(Math.random() * characters.length);
    otp += characters[randomIndex];
  }

  return otp;
};
