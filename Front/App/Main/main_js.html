function showAnnouncementPopup(){
  const announcementCheck =  localStorage.getItem("announcement")

  const announcementId_local =  localStorage.getItem("idAnnouncement")
  const announcementId_config =  document.getElementById('announcementId_config').textContent

  const userId_config =  document.getElementById('user_id_config').textContent
  const userId_local =  localStorage.getItem("userId")

  
  // const announcementCheck =  sessionStorage.getItem("announcement")   
   
  // ตรวจสอบว่ามีการบันทึกค่าไว้ใน local storage
  // console.log("announcementId_local: "+ announcementId_local)
  // console.log("announcementCheck: "+ announcementCheck)
  // console.log("userId_local: "+ userId_local)


  if ( announcementId_local === null || announcementId_local !== announcementId_config || userId_local !== userId_config ){
    if( document.getElementById('announcement_config').innerHTML != ''){
      new bootstrap.Modal(document.getElementById('announcement_modal'), {keyboard: false }).show()
      document.getElementById('announcement_text_modal').innerHTML = document.getElementById('announcement_config').innerHTML

    }

  } else if ( announcementCheck !== 'checked' ){
    if( document.getElementById('announcement_config').innerHTML != ''){
      new bootstrap.Modal(document.getElementById('announcement_modal'), {keyboard: false }).show()
      document.getElementById('announcement_text_modal').innerHTML = document.getElementById('announcement_config').innerHTML

    }

  }
    

};
