

<script>







function removeEmptyRowsTxTreat() {
    const rowInputTx = document.getElementsByClassName('input-tx-row-treat').length
    // console.log(rowInputTx)

    if( rowInputTx > 1){
        //   removeEmptyProcedureRows();
        // Get all elements with the class '.procedure-options'
        const procedureOptions = document.querySelectorAll('.procedure-options');

        // Loop through all the procedure options
        for (let i = 0; i < procedureOptions.length; i++) {
            const procedure = procedureOptions[i];

            // Check if Choices.js is initialized and if the option value is empty or undefined
            const procedureValue = procedure.choicesInstance?.getValue(true);
            console.log(procedureValue); // For debugging

            // Check if procedureValue is empty or undefined
            const isProcedureEmpty = procedureValue === undefined || procedureValue.length === 0;

            // Only remove the row if the .procedure-options is empty or undefined
            if (isProcedureEmpty) {
                console.log(`Procedure option ${i + 1} is empty or undefined.`);

                // Remove the closest .input-tx-row-treat row
                const rowToRemove = procedure.closest('.input-tx-row-treat');
                if (rowToRemove) {
                    rowToRemove.remove();
                    console.log(`Removed row for empty procedure option ${i + 1}.`);
                }
            }
        }

        // console.log('Checked all procedure options inputs.');
        return 'done';

    
    }

    
};












</script>
