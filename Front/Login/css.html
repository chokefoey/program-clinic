/* ************************************************************************************** */
/* flip  */
/* ************************************************************************************** */


.flip-container {
  perspective: 1000px;
  width: 100px;
  height: 100px;
  border-radius: 50%; /* Makes the container circular */
  overflow: hidden; /* Ensures any overflow is clipped */
}

.flipper {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  animation: flip 20s infinite; /* Total duration is 20 seconds */
}

.front,
.back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 50%; /* Makes both sides circular */
}

.front {
  background-color: #fff; /* Background color for the front */
}

.back {
  transform: rotateY(180deg);
  background-color: #333; /* Background color for the back side */
  color: #fff; /* Text color */
}

/* Keyframes for the flip animation */
@keyframes flip {
  0%, 39% {
    transform: rotateY(0deg); /* Hold front for 4 seconds */
  }
  40%, 55% {
    transform: rotateY(180deg); /* Flip to back (1 second) */
  }
  56%, 85% {
    transform: rotateY(180deg); /* Hold back for 4 seconds */
  }
  86%, 99% {
    transform: rotateY(0deg); /* Flip back to front (1 second) */
  }
  100% {
    transform: rotateY(0deg); /* Ensure the front is visible at the end of the cycle */
  }
}



 


/* ************************************************************************************** */
/* line แสดง การทำงานอยู่เบื้องหลัง auto refresh  working */
/* ************************************************************************************** */

.line{
  position: fixed;
  top: 0px;
  left: 0;
  width: 100%;
  height: 4px;
  background: #2F4F4F;
  z-index: 99999;
  overflow: hidden;
}
.dot{
  position: absolute;
  height: 100%;
  width: 5px;
  background: #fff;
  animation: dotleft 2s cubic-bezier(.72,.03,.75,.54) infinite;
}
.dot1{
}
.dot2{
  animation-delay: .4s;
}
.dot3{
  animation-delay: .8s;
}
.dot4{
  animation-delay: 1.2s;
}
.dot5{
  animation-delay: 1.6s;
}
@keyframes dotleft {
  0% {
      left: 0%;
  }
  100% {
      left: 100%;
  }
}
