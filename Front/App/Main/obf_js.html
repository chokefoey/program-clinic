// IIFE (Immediately Invoked Function Expression) to toggle console logs
(function() {
    // Save original console.log function
    console._originalLog = console.log;

    // Function to enable or disable logging
    console.toggleLogs = function(showLogs) {
        if (showLogs) {
            console.log = console._originalLog;
        } else {
            console.log = function() {};
        }
    };
})();

// Toggle logs based on devModeOnOff value

// Function to swap between modals
function swapModal(currentModalId, nextModalId) {
  const currentModal = bootstrap.Modal.getInstance(document.querySelector(currentModalId));
  currentModal.hide(); // Close the current modal

  // Show the next modal after the current one is hidden
  currentModal._element.addEventListener('hidden.bs.modal', function () {
    const nextModal = new bootstrap.Modal(document.querySelector(nextModalId));
    nextModal.show();
  }, { once: true });
};

function formatWtHt(input) {
  // Allow only numbers and the dot symbol (.)
  input.value = input.value.replace(/[^0-9.]/g, '');
  
  // Ensure there's only one dot allowed
  const splitValue = input.value.split('.');
  if (splitValue.length > 2) {
    input.value = splitValue[0] + '.' + splitValue[1];
  }

  // Limit the length to 5 characters
  if (input.value.length > 5) {
    input.value = input.value.slice(0, 5);
  }

  // Alert if the value exceeds 50.00
  const numValue = parseFloat(input.value);
  if (numValue > 200.0) {
    alert('Value cannot exceed 200.00');
    input.value = ''; // Reset value 
  }
};

function validateDayInput(input) {
  if (input.value === '') {
      input.value = '';
  } else {
      const numericValue = input.value.replace(/[^0-9]/g, '').replace(/^0+/, '');
      const dayValue = Math.min(31, Math.max(1, numericValue));
      input.value = numericValue === '' ? '' : dayValue;
  }
};


function validateNumberInput(input, maxValue) {
  if (input.value === '') {
      input.value = '';
  } else {
      const numericValue = input.value.replace(/[^0-9]/g, '').replace(/^0+/, '');
      const validValue = Math.min(maxValue, Math.max(1, numericValue));
      input.value = numericValue === '' ? '' : validValue;
  }
};
