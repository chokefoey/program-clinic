function makePdfMedCerNormTh(){
  const medcerNormInfo = {}

    const row = elements.tablePatientRegist.getRow(patientId); //return row component with index of 1
    const patientInfo = row.getData();
    console.log(patientInfo)

  runmMakePdfMedCerNormTh(patientInfo,clinicInfo,medcerNormInfo);

}
