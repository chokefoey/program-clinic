


 

<div class="modal fade" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel"   id="user_switch_modal">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-secondary bg-opacity-10">
        
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>

       </div>
      <div class="modal-body bg-secondary bg-opacity-10">
        <div class="w-100 text-center mb-2"> 
          <h6>กรอก Username และ Password</h6>
        </div>

        <form method="post" id="user_switch_form">
          
          <div class="mt-3 input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" class="form-control" placeholder="Username" name="username" id="username_switch_input"  >
          </div>
            
          
          <div class="mt-3 input-group">
            <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
            <input type="password" class="form-control" placeholder="Password" name="password" id="password_switch_input"  >
          </div>

          <div class="mt-2">
            <center>
              <button type="submit" class="btn btn-secondary mt-2" id="switch_user_btn">เปลี่ยนผู้ใช้งาน</button>
            </center>
          </div>


        </form>
         

      </div>
       
    </div>
  </div>
</div>
