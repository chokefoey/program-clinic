<script>

  

  function clickEventHandlerLoginView(e){
    if (e.target.matches("#enter_login_button") ){
      // console.log("sdsd")
      const userNameInput =  document.getElementById("username_login_input").value.trim().toString().toLowerCase()    
      const passWordInput =  document.getElementById("password_login_input").value.trim().toString().toLowerCase() 

      if( userNameInput == "" || passWordInput == "" ){
        Swal.fire({ icon: 'error',title: 'ข้อมูลไม่ครบถ้วน',html: "<h5 align='center'>กรุณาระบุ username และ password</h5>"})

      } else {
        loadingStart('กำลังเข้าสู่ระบบ..')
      }

    }
    if (e.target.matches("#user_regist_btn") ){
      clearInputOtp();

      // ตรวจสอบ input ที่ required
      const resInput = checkFormInputRequired("user_add_form")   // ถ้าถูกต้องให้ return true ไม่ถูกต้อง false
      // console.log(resInput)

      // ตรวจสอบ password
      const pwd1 = document.getElementById("pass_word_user_add").value
      const pwd2 = document.getElementById("repeatpass_word_user_add").value

      // ตรวจสอบ email format
      const resEmail = checkEmail("user_add_form") // ถ้าถูกต้องให้ return true
      // console.log(resEmail)

      // ตรวจสอบ checkbox
      const resCheckBox = checkCheckBox("user_add_form") // ถ้าถูกต้องให้ return true
      // console.log(resCheckBox)

      
      if ( resInput == false){
        Swal.fire({ icon: 'error',title: 'กรอกข้อมูลให้ครบถ้วน' })
        // document.getElementById('login_view').addEventListener("input", inputEventHandlerLoginView)

      } 
      else if ( pwd1.length < 6 || pwd2.length < 6){
        Swal.fire({ icon:'error', title:'password ไม่ถูกต้อง', html:"<h5 align='center'>password ต้องมีความยาวอย่างน้อย 6 ตัวอักษร</h5>"})
        document.getElementById("pass_word_user_add").style.backgroundColor = 'orange';
        document.getElementById("repeatpass_word_user_add").style.backgroundColor = 'orange';
      } 
      else if ( pwd1 != pwd2 ){
        Swal.fire({ icon:'error', title:'password ไม่ถูกต้อง', html:"<h5 align='center'>password ไม่ตรงกัน</h5>"})
        document.getElementById("pass_word_user_add").style.backgroundColor = 'orange';
        document.getElementById("repeatpass_word_user_add").style.backgroundColor = 'orange';
      }
      else if ( resEmail == false ){
        Swal.fire({ icon: 'error',title: 'รูปแบบ email ไม่ถูกต้อง' })
        document.getElementById("email_adress_user_add").style.backgroundColor = 'orange';
      } 
      else if ( resCheckBox == false ){
        Swal.fire({ icon: 'error', html:'<center><h5>' + 'กรุณาติ๊กเครื่องหมายถูก ' + '<i class="bi bi-check2-square"></i>'  + ' เพื่อยอมรับเงื่อนไข'  +'</h5></center>' })
      } 
      else {
        const userEmailAdd = document.getElementById("email_adress_user_add").value.trim()
        sendOTPforUserAdd(userEmailAdd)
        loadingStart()
        
      }
    }
    if (e.target.matches("#request_password_btn") ){
      // console.log("sdsd")
      if( document.getElementById("email_adress_user_forget").value.trim() == "" ){
        Swal.fire({ icon:'error', title:'ข้อมูลไม่ครบถ้วน', html:"<h5 align='center'>กรุณากรอก Email</h5>"})
      } else {
        recoverUserData()
      }
    }
    if (e.target.matches("#confirm_otp_btn") ){
      console.log("confirm_otp_btn")
      const otpInput = document.getElementById("_otp").innerHTML
      const otpInputLength = otpInput.length
      // console.log(otp)
      // console.log(otpInputLength)
      if( otpInputLength < 6 ){
        Swal.fire({ icon:'error', title:'ไม่ถูกต้อง'})
         
      } else if ( document.getElementById("otp_return").innerHTML == otpInput ){
        // console.log('OK')
        // const fileInput = document.getElementById('user_pic_regist_input');
        // registUser()

        addUser()

        

      } else {
        Swal.fire({ icon:'error', title:'ไม่ถูกต้อง'})
      }
    }
    if (e.target.matches("#resend_otp_btn") ){
      console.log("resend_otp_btn")
      resendOTP();
    }
    // if (e.target.matches("#upload_userpic_btn") ){
    //   console.log("upload_userpic_btn")
    //   const fileInput = document.getElementById('user_pic_regist_input');
    //   const urlUserPic = uploadFileUserPicRegist(fileInput)
    //   console.log(urlUserPic)

    // }
    // if (e.target.matches("#cancelupload_userpic_btn") ){
    //   console.log("cancelupload_userpic_btn")
      
    // }

    

    
  };

  //     checkFormInputRequired("user_add_form")

  function changeEventHandlerLoginView(e){
    if (e.target.matches("#user_pic_regist_input") ){
      console.log("user_pic_regist_input")
      
      if ( e.target.value.length != 0){
        // console.log(e.target.value.length)
        const output = checkFileTypeAndSize(e);
        if( checkFileTypeAndSize(e)[0].result == "Correct" ){
          console.log(output)
          createBase64Data(e);

          document.getElementById("user_pic_large").src = URL.createObjectURL(document.getElementById(e.target.id).files[0])

          // checkFileTypeAndSize(e)[0].fileTypeInput == "application/pdf" ? 
          //   document.getElementById("user_pic_large").src = urlPdfLogo : 
          //   document.getElementById("user_pic_large").src = URL.createObjectURL(document.getElementById(e.target.id).files[0])

        } else if( checkFileTypeAndSize(e)[0].result == "Incorrect" ) {
          cancelFile(e);
          document.getElementById("user_pic_large").src = ""
          Swal.fire({icon: 'error',title:"ไม่ถูกต้อง", html: "<h5 align='center'>" + output[0].detail + "</h5>"  + "<h6> Your file is "+ output[0].fileSize +" KB</h6>" })
          
          // console.log(output)
          // console.log("file1 canceled")
          
        }
      } else if ( e.target.value.length == 0){
        // console.log(e.target.value.length)  
        cancelFile(e);
        document.getElementById("user_pic_large").src = ""

        // console.log("file1 canceled")
        // console.log(fileInfo) 
        
      }

    }
    

  };


  


  document.getElementById('login_view').addEventListener("change", changeEventHandlerLoginView)
  document.getElementById('login_view').addEventListener("click", clickEventHandlerLoginView)


</script>
