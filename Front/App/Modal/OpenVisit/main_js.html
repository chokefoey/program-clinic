<script>


  function openModalPatientSendRoom(patientId,opdVisitId){
    console.log("patientId " + patientId )
    console.log("opdVisitId " + opdVisitId )

    const opdVisitIdTreat = document.getElementById('opd_visitid_treat').textContent  
    console.log("opdVisitIdTreat " + opdVisitIdTreat ) 

    let modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('send_patient_modal')) // Returns a Bootstrap modal instance
    modal.show();  // modal.hide();  modal.show();

    document.getElementById('patient_id_sendroom').textContent = patientId 
    document.getElementById('oldvisit_id_sendroom').textContent = opdVisitId

    const patientRegistInfo = elements.tablePatientRegist.getRow(patientId).getData();
    console.log(patientRegistInfo);

    document.getElementById('patient_fname_sendroom').textContent = patientRegistInfo.identityData.firstName
    document.getElementById('patient_lname_sendroom').textContent = patientRegistInfo.identityData.lastName
    document.getElementById('hn_sendroom').textContent = patientRegistInfo.incrementHn


    // Assuming 'elements["target_room"]' is your Choices.js instance
    const selectedValueRoom = elements["target_room"].getValue(true);  // Passing true returns the value(s) as a string or array
    const selectedValueDoctor = elements["target_doctor"].getValue(true);  // Passing true returns the value(s) as a string or array

    console.log(selectedValueRoom);
    console.log(selectedValueDoctor);

    
    if ( opdVisitId == ""){
      console.log("ยังไม่เปิด visit และยังไม่ได้นัดหมาย")

      document.getElementById('patient_id_sendroom').textContent = patientId
      document.getElementById('oldvisit_id_sendroom').textContent = opdVisitId
 
      elements["target_room"].removeActiveItems();  // This clears the selection but keeps the choices set ค่าของ choice js
      elements["target_doctor"].removeActiveItems();  // This clears the selection but keeps the choices set ค่าของ choice js
       

    } else if ( opdVisitId != ""){
      const opdVisitInfo = elements.tablePending.getRow(opdVisitId).getData(); 
      console.log(opdVisitInfo)

      if( opdVisitInfo.appointmentData == ""){
        if ( opdVisitId === opdVisitIdTreat ){
          console.log("เข้าห้องตรวจแล้ว ต้องการเปลี่ยนห้องตรวจ ยังไม่ได้นัด")
          document.getElementById('target_room').value = opdVisitInfo.roomName || "" ;
          document.getElementById('target_doctor').value = opdVisitInfo.doctorName || "" ;

          elements["target_room"].setChoiceByValue(opdVisitInfo.roomName); // set ค่าของ choice js
          elements["target_doctor"].setChoiceByValue(opdVisitInfo.doctorName); // set ค่าของ choice js

        } else {
          console.log("เปิด visit แต่ยังไม่ได้นัดหมาย")
          // set ค่ากับ set Choice ไม่เหมือนกัน 
          document.getElementById('target_room').value = opdVisitInfo.roomName || "" ;
          document.getElementById('target_doctor').value = opdVisitInfo.doctorName || "" ;

          elements["target_room"].setChoiceByValue(opdVisitInfo.roomName); // set ค่าของ choice js
          elements["target_doctor"].setChoiceByValue(opdVisitInfo.doctorName); // set ค่าของ choice js

        }
        


      } else if( opdVisitInfo.appointmentData != ""){

        if ( opdVisitId != opdVisitIdTreat ){
          console.log("เปิด visit เพื่อนัดหมายล่วงหน้าแล้ว ต้องการส่งเข้าห้องตรวจ")
          document.getElementById('target_room').value = opdVisitInfo.appointmentData.description.roomName || "";
          document.getElementById('target_doctor').value = opdVisitInfo.appointmentData.description.doctorName || "" ;

          elements["target_room"].setChoiceByValue(opdVisitInfo.appointmentData.description.roomName); // set ค่าของ choice js
          elements["target_doctor"].setChoiceByValue(opdVisitInfo.appointmentData.description.doctorName); // set ค่าของ choice js

        } else if ( opdVisitId === opdVisitIdTreat ){
          console.log("เข้าห้องตรวจแล้ว ต้องการเปลี่ยนห้องตรวจ นัดแล้ว")
          document.getElementById('target_room').value = opdVisitInfo.roomName || "" ;
          document.getElementById('target_doctor').value = opdVisitInfo.doctorName || "" ; 

          elements["target_room"].setChoiceByValue(opdVisitInfo.roomName); // set ค่าของ choice js
          elements["target_doctor"].setChoiceByValue(opdVisitInfo.doctorName); // set ค่าของ choice js

        } else {
          console.log("อื่นๆ")
          // set ค่ากับ set Choice ไม่เหมือนกัน
          // document.getElementById('target_room').value = opdVisitInfo.appointmentData.description.roomName || "";
          // document.getElementById('target_doctor').value = opdVisitInfo.appointmentData.description.doctorName || "" ;
          document.getElementById('target_room').value = opdVisitInfo.roomName || "" ;
          document.getElementById('target_doctor').value = opdVisitInfo.doctorName || "" ;

          elements["target_room"].setChoiceByValue(opdVisitInfo.roomName); // set ค่าของ choice js
          elements["target_doctor"].setChoiceByValue(opdVisitInfo.doctorName); // set ค่าของ choice js

        }
        

      }
      
    }


  };


 
  function sendPatientToTreat(){
    loadingStart();

    const visitDate = getCurrentDate();
    const visitTime = getCurrentTime();
    const oldVisitId = document.getElementById("oldvisit_id_sendroom").textContent


    // Assuming 'elements["target_room"]' is your Choices.js instance by id
    const selectedValueRoom = elements["target_room"].getValue(true);  // Passing true returns the value(s) as a string or array
    const selectedValueDoctor = elements["target_doctor"].getValue(true);  // Passing true returns the value(s) as a string or array

    console.log(selectedValueRoom);
    console.log(selectedValueDoctor);

    
    const opdStatus = "ส่งห้องตรวจ"

    // กำหนดสถานะ เพื่อส่งไป update ตาราง appointment หน้าบ้านและ sheet หลังบ้าน
    const dataObj = {}
      dataObj.opdStatus = 'มาตามนัด'  

    const patientId = document.getElementById("patient_id_sendroom").textContent
    const patientRegistInfo = elements.tablePatientRegist.getRow(patientId).getData();
    // console.log(patientRegistInfo)

    // ส่งไปหลังบ้าน
    const patientInfo = {}
      patientInfo.visitDate =  visitDate
      patientInfo.visitTime =  visitTime
      patientInfo.patientId = patientId
      patientInfo.firstName = document.getElementById("patient_fname_sendroom").textContent
      patientInfo.lastName = document.getElementById("patient_lname_sendroom").textContent
      patientInfo.incrementHn = patientRegistInfo.incrementHn
      patientInfo.cid = patientRegistInfo.cid
      patientInfo.roomName = selectedValueRoom // document.getElementById("target_room").value
      patientInfo.doctorName = selectedValueDoctor // document.getElementById("target_doctor").value
      patientInfo.opdStatus = opdStatus

      patientInfo.userStamp = {
        "userId": document.getElementById("user_id_status").textContent,
        "userName": document.getElementById("user_fullname_status").textContent,

      }

    console.log(patientInfo)
    

    google.script.run.withSuccessHandler((res)=>{
      console.log(res[0])

      document.getElementById('target_room').value = "" 
      document.getElementById('target_doctor').value = ""   

      const opdVisitId = res[0].newId
      const dateStamp = res[0].dateStamp
      const timeStamp = res[0].timeStamp


      // ส่งไปตารางหน้าบ้าน
      const opdVisitInfo = {opdVisitId,dateStamp,timeStamp,...patientInfo} 
        opdVisitInfo.piData = "";
        opdVisitInfo.peData = "";
        opdVisitInfo.ixData = "";
        opdVisitInfo.dxData = "";
        opdVisitInfo.txData = "";
        opdVisitInfo.hmData = "";
        opdVisitInfo.summaryData = "";
        opdVisitInfo.appointmentData = "";
        opdVisitInfo.appointDate = "";
        opdVisitInfo.appointTime = "";

      // console.log(opdVisitInfo) 

      elements.tablePending.addRow([opdVisitInfo], true); // เพิ่ม visit ใหม่
      elements.tableAppointment.addRow([opdVisitInfo], true); // เพิ่ม visit ใหม่


      let modal1 = bootstrap.Modal.getOrCreateInstance(document.getElementById('send_patient_modal')) 
      modal1.hide(); // modal1.show();

      searchTablePending();

       
      // loadingEnd();
      workingEnd('สำเร็จ');

    }).sendPatientToTreat(patientInfo)


    // ส่งไป update สถานะว่า ผป มาตามนัด
    if( oldVisitId != ""){
      google.script.run.withSuccessHandler((res)=>{
        // console.log(res)
        
        // update สถานะ visit เดิมว่ามาตามนัด
        elements.tableAppointment.updateData([{opdVisitId:oldVisitId, opdStatus:'มาตามนัด'}]); 

      }).editAppointmentDataByVid(oldVisitId,dataObj) 

    }
    

  };


 








</script>
