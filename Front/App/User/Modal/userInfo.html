
 

<div class="modal fade" data-bs-keyboard="false" tabindex="-1" id="user_info_modal">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-secondary bg-opacity-10">
        
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>

        <!-- <button type="button" class="btn btn-secondary shadow" data-bs-dismiss="modal">Close</button> -->
      </div>
      <div class="modal-body bg-secondary bg-opacity-10">
        <div class="container">

          <div class="w-100 text-center mb-2"> 
            <h6>ข้อมูลส่วนตัว</h6>
          </div>
         

         <form class="row g-3 d-none" id="user_form_placeholder">
          <p class="placeholder-glow">
            <span class="mt-3 placeholder placeholder-lg col-12"></span>
            <span class="mt-3 placeholder placeholder-lg col-12"></span>
            <span class="mt-3 placeholder placeholder-lg col-12"></span>
            <span class="mt-3 placeholder placeholder-lg col-12"></span>
            <span class="mt-3 placeholder placeholder-lg col-12"></span>
            <span class="mt-3 placeholder placeholder-lg col-12"></span>
            <span class="mt-3 placeholder placeholder-lg col-12"></span>
            <span class="mt-3 placeholder placeholder-lg col-12"></span>
            <span class="mt-3 placeholder placeholder-lg col-12"></span>
          </p>
         </form>
          

          <form class="row g-3 d-none" id="user_form">
            <div class="col-md-4">
              <label class="form-label">ชื่อ</label>
              <input type="text" class="form-control text-primary" name="firstName" id="first_name_user" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">นามสกุล</label>
              <input type="text" class="form-control text-primary"  name="lastName" id="last_name_user" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">ตำแหน่ง</label>
              <select class="form-select text-primary" aria-label="Default select example"  name="userPosition"  id="position_user" required>
                <option value="" selected> </option>
                <option value="doctor">Doctor</option>
                <option value="nurse">Nurse</option>
                <option value="pt">PT</option>
                <option value="ot">OT</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Username</label>
              <input type="text" class="form-control text-primary"  name="userName" id="user_name_user" required>
            </div>
            <div class="col-md-4"> 
              <label class="form-label">Password</label>
              <input type="text" class="form-control text-primary"  name="passWord"  id="pass_word_user" required> 
            </div>
            <div class="col-md-4">
              <label class="form-label">Email</label>
              <input type="email" class="form-control text-primary"  name="emailAddress" id="email_address_user" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">เลขใบประกอบ</label>
              <input type="text" class="form-control text-primary"  name="userLicense" id="license_user" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">เบอร์โทร</label>
              <input type="text" class="form-control text-primary" name="userPhone" id="phone_number_user" required>
            </div>
            <div class="col-md-4"> 
              <label class="form-label">จังหวัด</label>
              <select class="form-select text-primary"  name="roomArea"  id="room_area_user" required>
                <option selected></option>
                <option value="snk">SNK</option>
                <option value="npm">NPM</option>
                <option value="nbp">NBP</option>
                <option value="nki">NKI</option>
                <option value="lei">LEI</option>
                <option value="udn">UDN</option>
                <option value="bkn">BKN</option>
                <option value="other">Other</option>
                <option value="clinic">Clinic</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">หน่วยบริการ</label>
              <input class="form-control text-primary" type="search" list="datalistOptions_user_hos" name="userHos" id="hos_user" required>
              <datalist id="datalistOptions_user_hos">
                <option value="สกลนคร/รพศ.สกลนคร">
                <option value="อุดรธานี/รพศ.อุดรธานี">
                <option value="other">
              </datalist>
            </div>

          </form>

          

        </div>

      </div>
      <div class="modal-footer">
        <button type="button" class="d-none btn btn-primary" id="user_edit_btn">แก้ไขข้อมูล</button>
        <button type="button" class="d-none btn btn-primary" id="user_add_btn">เพิ่มข้อมูล</button>
      </div>
    </div>
  </div>
</div>
