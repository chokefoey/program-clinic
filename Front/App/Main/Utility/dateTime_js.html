  }
  let monthNames = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.","พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.","ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];

  let year = date.getFullYear() + 543;
  let month = monthNames[date.getMonth()];
  let numOfDay = date.getDate();

  return `${numOfDay} ${month} ${year}`;
};

function dateDiffInMonths(startDate,endDate) {
  const today = new Date();
  const specificDate = new Date(startDate); // older
  
  let yearsDiff = today.getFullYear() - specificDate.getFullYear();
  let monthsDiff = today.getMonth() - specificDate.getMonth();
  
  // Adjust if today's day is less than the specific date's day
  if (today.getDate() < specificDate.getDate()) {
    monthsDiff--;
  }
  
  return yearsDiff * 12 + monthsDiff;
};


// วันที่ปัจจุบัน
function getCurrentDate() {
  const currentDate = new Date();

  const year = currentDate.getFullYear();
  const month = String(currentDate.getMonth() + 1).padStart(2, '0');
  const day = String(currentDate.getDate()).padStart(2, '0');

  return `${year}-${month}-${day}`;  // Output: "2024-05-13"

};

function formatDateYYYYMMDD(dateString) {
  // Parse the input date string to create a Date object
  const date = new Date(dateString);

  // Get the year, month, and day from the Date object
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0'); // Months are zero-indexed
  const day = String(date.getDate()).padStart(2, '0');

  // Format the date in YYYY-MM-DD
  const formattedDate = `${year}-${month}-${day}`;

  return formattedDate;
};

function convertDateToTime(dateString) {
  // Parse the input date string to create a Date object
  const date = new Date(dateString);

  // Get the hours and minutes from the Date object
  const hours = String(date.getHours()).padStart(2, '0');
  // Ensure hours are in two digits
  if (hours.length === 1) {
      hours = '0' + hours;
  }
  const minutes = String(date.getMinutes()).padStart(2, '0');

  // Format the time in HH:MM
  const formattedTime = `${hours}:${minutes}`;

  return formattedTime;
};

function formatTime(timeString) {
  // Split the time string by colon
  let parts = timeString.split(':');

  // Extract hours and minutes
  let hours = parts[0];
  let minutes = parts[1];

  // Ensure hours are in two digits
  if (hours.length === 1) {
      hours = '0' + hours;
  }

  // Return the formatted time
  return `${hours}:${minutes}`;
};

function calculateAge(birthdate) {
  if (!birthdate) return { years: "", months: "", days: "" }; // Handle empty input

  const birth = new Date(birthdate);
  if (isNaN(birth.getTime())) return { years: "", months: "", days: "" }; // Handle invalid date

  const today = new Date();
  let years = today.getFullYear() - birth.getFullYear();
  let months = today.getMonth() - birth.getMonth();
  let days = today.getDate() - birth.getDate();

  if (days < 0) {
      months--;
      const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
      days += prevMonth.getDate();
  }

  if (months < 0) {
      years--;
      months += 12;
  }

  return {
      years: isNaN(years) ? "" : years,
      months: isNaN(months) ? "" : months,
      days: isNaN(days) ? "" : days,
  };
}

function arabicNumberToText(Number){
	var Number = checkNumber(Number);
	var NumberArray = new Array ("ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า", "สิบ");
	var DigitArray = new Array ("", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน");
	var BahtText = "";
	if (isNaN(Number))
	{
		return "ข้อมูลนำเข้าไม่ถูกต้อง";
	} else
	{
		if ((Number - 0) > 9999999.9999)
		{
			return "ข้อมูลนำเข้าเกินขอบเขตที่ตั้งไว้";
		} else
		{
			Number = Number.split (".");
			if (Number[1].length > 0)
			{
				Number[1] = Number[1].substring(0, 2);
			}
			var NumberLen = Number[0].length - 0;
			for(var i = 0; i < NumberLen; i++)
			{
				var tmp = Number[0].substring(i, i + 1) - 0;
				if (tmp != 0)
				{
					if ((i == (NumberLen - 1)) && (tmp == 1))
					{
						BahtText += "เอ็ด";
					} else
					if ((i == (NumberLen - 2)) && (tmp == 2))
					{
						BahtText += "ยี่";
					} else
					if ((i == (NumberLen - 2)) && (tmp == 1))
					{
						BahtText += "";
					} else
					{
						BahtText += NumberArray[tmp];
					}
					BahtText += DigitArray[NumberLen - i - 1];
				}
			}
			BahtText += "บาท";
			if ((Number[1] == "0") || (Number[1] == "00"))
			{
				BahtText += "ถ้วน";
			} else
			{
				DecimalLen = Number[1].length - 0;
				for (var i = 0; i < DecimalLen; i++)
				{
					var tmp = Number[1].substring(i, i + 1) - 0;
					if (tmp != 0)
					{
						if ((i == (DecimalLen - 1)) && (tmp == 1))
						{
							BahtText += "เอ็ด";
						} else
						if ((i == (DecimalLen - 2)) && (tmp == 2))
						{
							BahtText += "ยี่";
						} else
						if ((i == (DecimalLen - 2)) && (tmp == 1))
						{
							BahtText += "";
						} else
						{
							BahtText += NumberArray[tmp];
						}
						BahtText += DigitArray[DecimalLen - i - 1];
					}
				}
				BahtText += "สตางค์";
			}
			return BahtText;
		}
	}
};



function checkNumber(Number){
	var decimal = false;
	Number = Number.toString();						
	Number = Number.replace (/ |,|บาท|฿/gi,'');  		
	for (var i = 0; i < Number.length; i++)
	{
		if(Number[i] =='.'){
			decimal = true;
		}
	}
	if(decimal == false){
		Number = Number+'.00';
	}
	return Number
};

// เปลี่ยนวันที่ภาษาไทย เป็นวันที่ YYYY-MM-DD
// +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

function toDateYYYYMMDD(thaiDate) {
  if (!thaiDate || typeof thaiDate !== "string") return ""; // Handle empty or invalid input

  // แยกวันที่ เดือน และปี
  let parts = thaiDate.trim().split(" ");
  if (parts.length !== 3) return ""; // Ensure we have three parts

  let [day, month, year] = parts;

  // แปลงชื่อเดือนภาษาไทยเป็นตัวเลข
  const thaiMonths = {
      "มกราคม": "01", "กุมภาพันธ์": "02", "มีนาคม": "03", "เมษายน": "04",
      "พฤษภาคม": "05", "มิถุนายน": "06", "กรกฎาคม": "07", "สิงหาคม": "08",
      "กันยายน": "09", "ตุลาคม": "10", "พฤศจิกายน": "11", "ธันวาคม": "12"
  };

  if (!thaiMonths[month] || isNaN(parseInt(day, 10)) || isNaN(parseInt(year, 10))) return ""; // Validate input

  // แปลงปี พ.ศ. เป็น ค.ศ. (ลบ 543)
  let convertedYear = parseInt(year, 10) - 543;
  let convertedMonth = thaiMonths[month];
  let convertedDay = day.padStart(2, '0'); // Ensure two-digit day format

  // คืนค่าวันที่ในรูปแบบ YYYY-MM-DD
  return `${convertedYear}-${convertedMonth}-${convertedDay}`;
}
