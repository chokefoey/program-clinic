<script>


  function clickEventHandlerReportView(e){
    if (e.target.matches("#report_view_show_btn") ){
      // console.log("fdfdfdfdf")
      loadDashboardView()
      
    }
    if (e.target.matches("#download_report_visit_btn") ){
      // console.log("dsds")
      if ( document.getElementById("date_start_report").value == "" || document.getElementById("date_end_report").value == ""){
        alert("กรุณา ระบุช่วงเวลา")
    
      } else {
        downloadReportByVisitDate()

      }
      
    }

  };



  function inputEventHandlerReportView(e){
    if (e.target.matches("#date_start_report") || e.target.matches("#date_end_report")){
      // console.log("dsdsdsd")
      // loadDashboardView()
      setFilterDateReport()
      
    }
    

  };




  function setFilterDateReport(){
    // document.getElementById("filtertype_table_pending").value = 3 ;
    // document.getElementById('inlineRadio1').checked

    const dataStart = document.getElementById("date_start_report").value
    const dataEnd = document.getElementById("date_end_report").value

    // ค้นหาทั้งตาราง searchtable
    elements.tablePending.setFilter([
        {field:"visitDate",type: ">=",value:dataStart}, // search with and
        {field:"visitDate",type: "<=",value:dataEnd}, // search with and
        // [
        //     {field:"hn",type: "like",value: searchInput}, // or
        //     {field:"firstName",type: "like",value: searchInput}, // or
        //     {field:"lastName",type: "like",value: searchInput}, // or
        // ]
    ]);

  };












  document.getElementById('report_view').addEventListener("click", clickEventHandlerReportView)
  document.getElementById('report_view').addEventListener("input", inputEventHandlerReportView)


 

</script>
