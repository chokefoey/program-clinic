


<div class="modal fade"  id="procedureinfo_modal"  tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-secondary bg-opacity-10">
        
        <button type="button" class="btn-close"  data-bs-dismiss="modal" aria-label="Close"></button>

      </div>
      <div class="modal-body bg-secondary bg-opacity-10">
        <div class="w-100 text-center mb-2"> 
          <h3>ข้อมูลหัตถการ</h3>
          
        </div>

        <form id="procedure_info_form">
          <div class="row mt-1">
            <div class="col-md-4 mt-2">
              <label class="form-label">procedureId</label>
              <input type="text" class="form-control text-primary" name="procedureId" id="procedure_id" disabled> 
            </div>
          </div>
          <div class="row mt-1">
            <div class="col-md-6 mt-2">
              <label class="form-label">ชื่อหัตถการ</label>
              <input type="text" class="form-control text-primary" name="procedureName" id="procedure_name" required>
 
            </div>
            <div class="col-md-6 mt-2">
              <label class="form-label">ราคา</label>
              <input type="text" class="form-control text-primary" name="price" id="price" required>
 
            </div>
             
             
              
          </div>
          
          
        </form>
       

       

      </div>
      <div class="modal-footer">
        <button type="button" class="d-none btn my-btn btn-primary" id="add_procedure_btn">เพิ่ม</button>
        <button type="button" class="d-none btn my-btn btn-secondary" id="edit_procedure_btn">แก้ไข</button>
        <button type="button" class="d-none btn my-btn btn-danger" id="delete_procedure_btn">ลบ</button>
       </div>
    </div>
  </div>
</div>
