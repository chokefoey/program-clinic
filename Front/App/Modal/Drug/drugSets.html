

<div class="modal fade"  id="drugsets_modal" tabindex="-1" >
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content">
      <div class="modal-header bg-secondary bg-opacity-10">
        
        <button type="button" class="btn-close"  data-bs-dismiss="modal" aria-label="Close"></button>

      </div>
      <div class="modal-body bg-secondary bg-opacity-10">
        <div class="w-100 text-center mb-2"> 
          <h6>
            <span>ยาชุด:</span>
            <span id="drugset_name"></span>
            <span>ID:</span>
            <span id="drugset_id"></span>
          </h6>
        </div>

         
        <div class="row mt-2 justify-content-center" >
            <div class="col-sm-5 mb-2 mb-sm-0 ">
                <div class="col-md mt-2">
                  <div class="d-none form-control" id="search_input_table_drugset_parent">
                    <select class="form-control" id="search_input_table_drugset" >

                    </select>
                  </div>
                  <input type="search" class="form-control" list="datalistOptions_newDrugSetName" id="new_drugset_name_input" placeholder="กรอกชื่อยาชุดใหม่...">
                  <datalist id="datalistOptions_newDrugSetName">
                    
                  </datalist>
                    
                </div>
            </div>
        </div>
           
          
        

        <form class="row mt-1 p-1 text-black" id="form_table_hm_drugset">
          <table class="table table-bordered table-sm table-hover" id="table_hm_drugset"> 
            <thead class ="table-secondary">
              <tr>
                <th scope="col">#</th>
                <th scope="col">ชื่อยา/หน่วย/ราคา/ข้อบ่งชี้/รหัส</th>
                <th scope="col">วิธีใช้/ชื่อเต็ม/จน.ต่อวัน</th>
                <th scope="col" data-bs-toggle="tooltip" data-bs-title="จน.หน่วยทั้งหมด = จน.หน่วยต่อวัน x จำนวนวัน">จำนวน</th>
                <th class="d-none" scope="col" data-bs-toggle="tooltip" data-bs-title="ราคารวมต่อรายการ = ราคาต่อหน่วย x จน.หน่วยทั้งหมด">ราคารวม</th>
                <th scope="col"></th>
              </tr>
            </thead>
              
            <tbody id="input_hm_drugset">
              <!-- Rows will be added here -->

            </tbody>
              
            <template id="input_hm_template_drugset"> 
              <tr class="input-line input-hm-row-drugset">
                <td class="text-center align-middle" ></td>
                <td class="col-5">
                  <div>
                    <select class="drug-options-drugset form-control input-hm-drugset" >
                       
                    </select>
                  </div>
                </td>
                <td class="col-5">
                  <div>
                    <select class="dose-options-drugset form-control input-hm-drugset input-hm-dose-drugset" >
                       
                    </select>
                  </div>
                </td>
                <td class="col-2">
                  <div class="input-group">
                    <input type="number" min="0" class="form-control bg-opacity-10 input-hm-drugset input-hm-amount-drugset" style="min-width: 60px;">
                    <span class="input-group-text homemed-type-drugset" style="width: 70px;"></span>
                  </div>
                </td>
                <td class="d-none col-1">
                  <input type="text" class="form-control input-hm-drugset input-hm-price-drugset" disabled> 
                </td>
                <td class="col-1 text-center align-middle">
                  <div>
                    <button type="button" class="btn btn-outline-danger remove-input-hm-drugset">ลบ</button> 
                  </div>
                </td>
              </tr>
            </template>
              
          </table>

          <div class="row justify-content-end">
            <div>
              <button type="button" class="btn btn-secondary" id="add_input_hm_row_drugset_btn">+ เพิ่ม</button>
            </div>
          </div>

          
        </form>
       

       

      </div>
      <div class="modal-footer">
        <button type="button" class="d-none my-btn btn btn-primary" id="add_drugset_btn">บันทึก</button>
        <button type="button" class="d-none my-btn btn btn-secondary" id="edit_drugset_btn">แก้ไขยาชุด</button>
        <button type="button" class="d-none my-btn btn btn-danger" id="delete_drugset_btn">ลบยาชุด</button>
        <button type="button" class="d-none my-btn btn btn-primary" id="select_drugset_btn">เลือก</button>

       </div>
    </div>
  </div>
</div>
